version: "2.0"
author: xuNNyy
patch: 12.1
spec: 1473
name: xuNNyy_evoker_augmentation
entry: main
movement_allowed: buff.hover.up

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Dispel"
    type: checkbox
    default: true

variables:
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  auto_cds: target.boss|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds
  have_em: buff.ebon_might_self.up
  ebon_might_low: buff.ebon_might_self.remains<4
  breath_ready: cooldown.breath_of_eons.ready
  boe_up: buff.breath_of_eons.up
  tip_the_scales_up: buff.tip_the_scales.up
  essence_burst: buff.essence_burst.stack>=1
  essence_high: essence>=4
  ancient_flame_up: buff.ancient_flame.up
  leaping_flames_up: buff.leaping_flames.up
  has_chronowarden: talent.chrono_flame
  pool_for_boe: "!var.boe_up&cooldown.breath_of_eons.remains<=3"

lists:
  interrupts:
  - quell,if=interrupt.target.check,use_off_gcd=1
  - quell.mouseover,if=interrupt.mouseover.check,use_off_gcd=1
  - quell.focus,range_check=focus,if=interrupt.focus.check,use_off_gcd=1

  defensives:
  - renewing_blaze,if=health.pct<=65,use_off_gcd=1
  - obsidian_scales,if=health.pct<=50,use_off_gcd=1
  - cauterizing_flame,if=health.pct<=40,use_off_gcd=1

  dispel:
  - cauterizing_flame,if=player.has_poison|player.has_disease|player.has_curse

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&var.have_em
  - trinket2,use_off_gcd=1,if=config.use_trinkets&var.have_em

  buffs:
  - ebon_might,if=!var.have_em|var.ebon_might_low
  - prescience,if=cooldown.prescience.charges>=1,use_off_gcd=1
  - blistering_scales,target=tanks.lowest,if=talent.blistering_scales&cooldown.blistering_scales.ready

  cooldowns:
  - breath_of_eons,if=var.have_em,delay=500,global_delay=300
  - deep_breath,if=!talent.breath_of_eons,delay=500,global_delay=300
  - tip_the_scales,use_off_gcd=1,if=var.have_em&(cooldown.fire_breath.ready|cooldown.upheaval.ready),delay=300
  - time_skip,if=talent.time_skip&var.have_em,delay=300

  fb:
  - fire_breath,empower_to=1,if=var.have_em
  - fire_breath,empower_to=1

  st:
  - call_action_list,name=buffs
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=fb,if=cooldown.fire_breath.ready&!var.pool_for_boe
  - upheaval,empower_to=1,if=var.have_em&!var.pool_for_boe
  - eruption,if=var.essence_burst
  - eruption,if=var.essence_high&var.have_em
  - chrono_flame,if=var.has_chronowarden&var.ancient_flame_up
  - living_flame,if=var.leaping_flames_up|var.ancient_flame_up
  - azure_strike
  - living_flame
  - chrono_flame

  aoe:
  - call_action_list,name=buffs
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=fb,if=cooldown.fire_breath.ready&!var.pool_for_boe
  - upheaval,empower_to=1,if=var.have_em&!var.pool_for_boe
  - eruption,if=var.essence_burst
  - eruption,if=var.have_em&essence>=2
  - chrono_flame,if=var.has_chronowarden
  - azure_strike
  - living_flame,if=var.leaping_flames_up
  - living_flame
  - chrono_flame

  racials:
  - berserking,if=var.have_em,use_off_gcd=1
  - blood_fury,if=var.have_em,use_off_gcd=1
  - fireblood,if=var.have_em,use_off_gcd=1
  - ancestral_call,if=var.have_em,use_off_gcd=1
  - lights_judgment
  - bag_of_tricks

  fallback:
  - ebon_might,if=target.exists&target.enemy&target.alive&(!var.have_em|var.ebon_might_low),ignore_queue=true
  - living_flame,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - chrono_flame,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Dispel
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - call_action_list,name=items,if=config.use_trinkets
  - call_action_list,name=racials,if=var.use_cds
  - potion,if=config.use_potions&var.have_em
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

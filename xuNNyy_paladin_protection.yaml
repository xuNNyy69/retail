version: "2.0"
author: xuNNyy
patch: 12.1
spec: 66
name: xuNNyy_paladin_protection
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  auto_taunt:
    label: "Auto Taunt"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Dispel"
    type: checkbox
    default: true

variables:
  auto_cds: target.boss|health.pct<=85|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds
  in_aw: buff.avenging_wrath.up
  shake_up: buff.shake_the_heavens.up

lists:
  taunt:
  - taunt,if=config.auto_taunt&player.combat&target.threat<3

  interrupts:
  - rebuke,if=target.casting.interruptible,use_off_gcd=1
  - rebuke.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - rebuke.focus,if=focus.casting.interruptible,use_off_gcd=1

  # Tank defensives: emergency cooldowns + active mitigation heal
  defensives:
  - divine_shield,if=usable.divine_shield&health.pct<=10&talent.final_stand
  - lay_on_hands,if=health.pct<=15
  - guardian_of_ancient_kings,if=health.pct<=40&!var.in_aw
  - ardent_defender,if=health.pct<=20
  - word_of_glory,if=buff.shining_light_free.up
  - word_of_glory,if=health.pct<=50&holy_power>=3

  dispel:
  - cleanse_toxins,if=player.has_poison|player.has_disease

  # Trinkets fire during Avenging Wrath window
  trinkets:
  - trinket1,use_off_gcd=1,if=var.in_aw
  - trinket2,use_off_gcd=1,if=var.in_aw

  # Major cooldowns — Avenging Wrath synced to Divine Toll window,
  # Divine Toll held for AW or used as Righteous Protector filler
  cooldowns:
  - avenging_wrath,if=usable.avenging_wrath,delay=300,global_delay=400
  - potion,if=config.use_potions&var.in_aw
  - fireblood,if=var.in_aw,use_off_gcd=1
  - blood_fury,if=var.in_aw,use_off_gcd=1
  - berserking,if=var.in_aw,use_off_gcd=1
  - ancestral_call,if=var.in_aw,use_off_gcd=1
  - divine_toll,if=usable.divine_toll&holy_power<=2,delay=300,global_delay=400

  # Generic fallback — used when neither Lightsmith nor Templar is detected
  standard:
  - hammer_of_light,if=buff.hammer_of_light_ready.up
  - judgment,if=usable.judgment
  - shield_of_the_righteous,if=usable.shield_of_the_righteous&(holy_power>=3|buff.divine_purpose.up)
  - holy_armaments,if=!buff.sacred_weapon.up|buff.sacred_weapon.remains<5
  - avengers_shield,if=usable.avengers_shield&(active_enemies>=2|buff.vanguard.up)
  - consecration,if=usable.consecration&buff.divine_guidance.stack>=5
  - hammer_of_wrath,if=cooldown.hammer_of_wrath.charges>=2
  - hammer_of_wrath
  - avengers_shield,if=usable.avengers_shield
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous&buff.blessed_assurance.up
  - blessed_hammer,if=buff.blessed_assurance.up
  - holy_armaments
  - blessed_hammer
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous
  - consecration,if=usable.consecration

  # Lightsmith hero tree (guide priority order)
  lightsmith:
  - consecration,if=usable.consecration&buff.divine_guidance.stack>=5
  - judgment,if=usable.judgment
  - shield_of_the_righteous,if=usable.shield_of_the_righteous&(holy_power>=3|buff.divine_purpose.up)
  - avengers_shield,if=usable.avengers_shield&(active_enemies>=2|buff.vanguard.up)
  - hammer_of_wrath,if=cooldown.hammer_of_wrath.charges>=2
  - hammer_of_wrath
  # Sacred Weapon pandemic — refresh when missing or <5s remaining
  - holy_armaments,if=!buff.sacred_weapon.up|buff.sacred_weapon.remains<5
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous&buff.blessed_assurance.up
  - blessed_hammer,if=buff.blessed_assurance.up
  # Holy Bulwark — 2 charges outside AW (higher value dump)
  - holy_armaments,if=cooldown.holy_armaments.charges>=2&!var.in_aw
  - avengers_shield,if=usable.avengers_shield
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous
  - blessed_hammer
  # Holy Bulwark — 1 charge low-priority filler
  - holy_armaments
  - consecration,if=usable.consecration

  # Templar hero tree (guide priority order)
  templar:
  - hammer_of_light,if=buff.hammer_of_light_ready.up
  - judgment,if=usable.judgment
  - shield_of_the_righteous,if=usable.shield_of_the_righteous&(holy_power>=3|buff.divine_purpose.up)
  - hammer_of_wrath,if=cooldown.hammer_of_wrath.charges>=2
  # Interrupt with Punishment talent OR Glory of the Vanguard proc
  - avengers_shield,if=usable.avengers_shield&(target.casting.interruptible&talent.punishment|buff.vanguard.up)
  - hammer_of_wrath
  # Shake the Heavens buff guard — maintain via Blessed Hammer
  - blessed_hammer,if=var.shake_up
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous&var.shake_up
  # Shining Light free WoG during Shake the Heavens (Hammerfall offensive value)
  - word_of_glory,if=buff.shining_light_free.up&var.shake_up
  - avengers_shield,if=usable.avengers_shield
  - blessed_hammer
  - hammer_of_the_righteous,if=usable.hammer_of_the_righteous
  - consecration,if=usable.consecration

  fallback:
  - judgment,if=usable.judgment&target.exists&target.enemy&target.alive,ignore_queue=true
  - blessed_hammer,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - hammer_of_the_righteous,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard)
  - call_action_list,name=interrupts,if=config.use_interrupts
  - call_action_list,name=taunt
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=trinkets,if=config.use_trinkets
  - call_action_list,name=lightsmith,if=talent.lightsmith
  - call_action_list,name=templar,if=talent.templar
  - call_action_list,name=standard
  - call_action_list,name=fallback

version: "2.0"
author: xuNNyy
patch: 12.1
spec: 268
name: xuNNyy_monk_brewmaster
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_taunt:
    label: "Auto Taunt"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  defensive_hp:
    label: "Major Defensive HP%"
    type: slider
    min: 20
    max: 80
    default: 50
  hold_purify_niuzao:
    label: "Hold Purify for Niuzao"
    type: checkbox
    default: true
  use_dispel:
    label: "Use Dispel (Detox)"
    type: checkbox
    default: true

variables:
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  auto_cds: target.boss|health.pct<=85|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds

  has_niuzao: talent.invoke_niuzao_the_black_ox
  has_charred: talent.charred_passions
  has_scalding: talent.scalding_brew
  has_rjw: talent.rushing_jade_wind
  has_moh: talent.aspect_of_harmony
  has_bma: talent.bring_me_another

  boc_up: buff.blackout_combo.up
  charred_up: buff.charred_passions.up
  charred_low: buff.charred_passions.remains<3
  niuzao_up: buff.invoke_niuzao_the_black_ox.up
  rjw_up: buff.rushing_jade_wind.up
  rjw_low: buff.rushing_jade_wind.remains<2.5
  balanced_strat_ready: buff.balanced_stratagem_magic.stack>=4

  moh_vitality_ready: buff.aspect_of_harmony_accumulator.up
  moh_spending: dot.aspect_of_harmony_damage.ticking

  pb_overcap: cooldown.purifying_brew.charges_fractional>1.25

  combat_gate: player.combat&(target.time_to_die>12|active_enemies>=3)
  safety_gate: cooldown.purifying_brew.charges_fractional>=0.5|cooldown.celestial_brew.charges_fractional>=1
  cb_near_cap: cooldown.celestial_brew.charges_fractional>1.8

  purify_no_niuzao: "!var.has_niuzao"
  purify_niuzao_active: "var.has_niuzao&var.niuzao_up"
  purify_niuzao_hold: "var.has_niuzao&!var.niuzao_up&cooldown.invoke_niuzao_the_black_ox.remains>10"

  energy_low: energy<40
  energy_filler: energy>40

lists:
  taunt:
  - provoke,if=config.auto_taunt&player.combat&target.exists&target.enemy&target.alive&target.threat<3,use_off_gcd=1

  interrupts:
  - spear_hand_strike,if=target.casting.interruptible,use_off_gcd=1
  - spear_hand_strike.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - spear_hand_strike.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  # Diffuse Magic is now a passive on Fortifying Brew in Midnight
  - fortifying_brew,if=health.pct<=config.defensive_hp
  - touch_of_karma,if=health.pct<=(config.defensive_hp+10)
  # MoH: emergency CB when low HP
  - celestial_brew,if=var.has_moh&health.pct<=60&!var.moh_spending
  # Non-MoH: stagger-based CB
  - celestial_brew,if=!var.has_moh&(stagger.pct>=65|(cooldown.purifying_brew.charges_fractional<0.6&stagger.pct>=40)|var.cb_near_cap)

  dispel:
  - detox,if=player.has_poison|player.has_disease

  purify:
  - purifying_brew,if=stagger.pct>=65
  - purifying_brew,if=stagger.pct>=35&(var.purify_no_niuzao|var.purify_niuzao_active|(config.hold_purify_niuzao&var.purify_niuzao_hold)|(!config.hold_purify_niuzao&var.has_niuzao&!var.niuzao_up))
  - purifying_brew,if=var.pb_overcap&stagger.pct>5

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.niuzao_up|!var.has_niuzao|target.time_to_die<20)&var.combat_gate&var.safety_gate
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.niuzao_up|!var.has_niuzao|target.time_to_die<20)&var.combat_gate&var.safety_gate
  - potion,if=config.use_potions&(var.niuzao_up|!var.has_niuzao|target.time_to_die<20)&var.combat_gate

  cooldowns:
  - touch_of_death,if=target.health.pct<=15|target.time_to_die<=10
  - invoke_niuzao_the_black_ox,if=var.has_niuzao&var.combat_gate,delay=500,global_delay=300
  # MoH: Celestial Brew triggers Aspect of Harmony spending phase (offensive use)
  - celestial_brew,if=var.has_moh&var.moh_vitality_ready&!var.moh_spending,delay=300,global_delay=200
  - celestial_brew,if=var.cb_near_cap,delay=300
  - black_ox_brew,if=var.energy_low&(!var.has_moh|cooldown.celestial_brew.charges_fractional<1),delay=300

  racials:
  - berserking,use_off_gcd=1,if=(var.niuzao_up|!var.has_niuzao)&var.combat_gate
  - blood_fury,use_off_gcd=1,if=(var.niuzao_up|!var.has_niuzao)&var.combat_gate
  - fireblood,use_off_gcd=1,if=(var.niuzao_up|!var.has_niuzao)&var.combat_gate
  - ancestral_call,use_off_gcd=1,if=(var.niuzao_up|!var.has_niuzao)&var.combat_gate
  - arcane_torrent,use_off_gcd=1,if=energy.deficit>=30
  - lights_judgment
  - bag_of_tricks

  st:
  - empty_barrel,if=var.has_bma
  - keg_smash
  - blackout_kick
  - chi_burst,if=!var.has_moh
  - chi_burst,if=var.has_moh&var.balanced_strat_ready
  - tiger_palm,if=var.boc_up&cooldown.keg_smash.remains>gcd
  - breath_of_fire,if=var.has_charred&(!var.charred_up|var.charred_low)
  - breath_of_fire,if=!var.has_charred
  - exploding_keg,if=!var.has_rjw|var.rjw_up
  - spinning_crane_kick,if=var.has_scalding&var.has_charred&var.charred_up&var.charred_low&dot.breath_of_fire.remains<9&var.want_aoe
  - rushing_jade_wind,if=!var.rjw_up|var.rjw_low
  - tiger_palm,if=var.energy_filler
  - spinning_crane_kick,if=var.want_aoe&var.energy_filler

  aoe:
  - empty_barrel,if=var.has_bma
  - keg_smash
  - blackout_kick
  - breath_of_fire,if=var.has_charred&(!var.charred_up|var.charred_low)
  - breath_of_fire,if=!var.has_charred
  - tiger_palm,if=var.boc_up&cooldown.keg_smash.remains>gcd
  - chi_burst,if=!var.has_moh|var.balanced_strat_ready
  - rushing_jade_wind,if=!var.rjw_up|var.rjw_low
  - spinning_crane_kick,if=var.has_charred&var.charred_up&var.charred_low&dot.breath_of_fire.remains<9
  - exploding_keg,if=!var.has_rjw|var.rjw_up
  - spinning_crane_kick,if=var.energy_filler
  - tiger_palm,if=var.energy_filler

  fallback:
  - keg_smash,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - breath_of_fire,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - chi_burst,if=talent.chi_burst&target.exists&target.enemy&target.alive,ignore_queue=true
  - spinning_crane_kick,if=target.exists&target.enemy&target.alive&target.range<=8&var.want_aoe,ignore_queue=true
  - blackout_kick,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - tiger_palm,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts
  - call_action_list,name=interrupts,if=config.use_interrupts
  - call_action_list,name=taunt
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=purify
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=racials,if=var.use_cds
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

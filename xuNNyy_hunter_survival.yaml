version: "2.0"
author: xuNNyy
patch: 12.1
spec: 255
name: xuNNyy_hunter_survival
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3

variables:

  # Hero-tree routing
  # Pack Leader (Howl of the Pack Leader) -- the dominant hero talent
  is_pl: talent.howl_of_the_pack_leader
  # Sentinel -- alternative hero talent
  is_sentinel: talent.sentinel

  # Key buff states
  tip_of_spear_up: buff.tip_of_the_spear.up
  sentinels_mark_up: debuff.sentinels_mark.up
  # Pack Leader: Howl beast procs
  howl_wyvern_up: buff.howl_of_the_pack_leader_wyvern.up
  howl_active: "buff.howl_of_the_pack_leader_wyvern.up|buff.howl_of_the_pack_leader_boar.up|buff.howl_of_the_pack_leader_bear.up"
  # Takedown active (after cast)
  takedown_active: buff.takedown.up

  # Wildfire Bomb charge management
  bomb_capping: cooldown.wildfire_bomb.charges>=2

  want_aoe: active_enemies>=config.aoe_threshold

lists:
  interrupts:
  - counter_shot,if=config.use_interrupts&target.casting.interruptible,use_off_gcd=1

  defensives:
  - exhilaration,if=config.use_defensives&health.pct<=55
  - survival_of_the_fittest,if=config.use_defensives&health.pct<=40
  - aspect_of_the_turtle,if=config.use_defensives&health.pct<=20

  racials:
  - berserking,use_off_gcd=1,if=var.takedown_active
  - blood_fury,use_off_gcd=1,if=var.takedown_active
  - fireblood,use_off_gcd=1,if=var.takedown_active
  - ancestral_call,use_off_gcd=1,if=var.takedown_active
  - lights_judgment
  - bag_of_tricks

  items:
  - use_item,slot=trinket1,use_off_gcd=1,if=config.use_trinkets&var.takedown_active
  - use_item,slot=trinket2,use_off_gcd=1,if=config.use_trinkets&var.takedown_active
  - potion,if=config.use_potions&var.takedown_active,use_off_gcd=1

  # ===========================================================
  # Single-target rotation
  # Core loop: Kill Command for Tip of the Spear stacks;
  # spend stacks on Takedown/Boomstick; Wildfire Bomb situationally
  # ===========================================================
  st:
  # Pack Leader: Howl beast ability is highest priority when ready
  - kill_command,if=var.is_pl&var.howl_active

  # Kill Command: primary TotS generator; keep rolling
  - kill_command

  # Sentinel: Wildfire Bomb when Sentinel's Mark is active
  - wildfire_bomb,if=var.is_sentinel&var.sentinels_mark_up

  # Wildfire Bomb: prevent charge cap
  - wildfire_bomb,if=var.bomb_capping

  # DPS Cooldowns (Takedown + Boomstick are mandatory talents)
  - takedown,if=config.use_cooldowns
  - boomstick,if=config.use_cooldowns

  # Sentinel: Moonlight Chakram proc
  - moonlight_chakram,if=talent.moonlight_chakram&var.is_sentinel

  # Pack Leader: Wildfire Bomb with Wyvern active + TotS stacks
  - wildfire_bomb,if=var.is_pl&var.howl_wyvern_up&var.tip_of_spear_up

  # Flamefang Pitch: optional AoE-focused CD
  - flamefang_pitch,if=talent.flamefang_pitch&config.use_cooldowns

  # Raptor Swipe: with Tip of the Spear buff
  - raptor_swipe,if=talent.raptor_swipe&var.tip_of_spear_up

  # Raptor Strike: general melee filler
  - raptor_strike

  # Wildfire Bomb: baseline usage
  - wildfire_bomb

  # ===========================================================
  # AoE / Multi-target rotation
  # Same core with Wildfire Bomb prioritized more for spread damage
  # ===========================================================
  aoe:
  # Pack Leader: Howl beast ability top priority
  - kill_command,if=var.is_pl&var.howl_active

  # Kill Command: generate TotS
  - kill_command

  # Boomstick: AoE cone -- strong in 2+ targets
  - boomstick,if=config.use_cooldowns

  # Wildfire Bomb: prevent charge cap
  - wildfire_bomb,if=var.bomb_capping

  # Sentinel: Wildfire Bomb with Sentinel's Mark
  - wildfire_bomb,if=var.is_sentinel&var.sentinels_mark_up

  # Takedown cooldown
  - takedown,if=config.use_cooldowns

  # Sentinel: Moonlight Chakram
  - moonlight_chakram,if=talent.moonlight_chakram&var.is_sentinel

  # Flamefang Pitch: AoE burst
  - flamefang_pitch,if=talent.flamefang_pitch&config.use_cooldowns

  # Raptor Swipe with TotS
  - raptor_swipe,if=talent.raptor_swipe&var.tip_of_spear_up

  # Raptor Strike
  - raptor_strike

  # Wildfire Bomb: baseline
  - wildfire_bomb

  fallback:
  - raptor_strike,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - hunters_mark,if=!buff.hunters_mark.up&!player.combat,range_check=none
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=racials,if=config.use_cooldowns
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

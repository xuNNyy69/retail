version: "2.0"
author: xuNNyy
patch: 12.1
spec: 255
name: xuNNyy_hunter_survival
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Tranq Shot"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]

variables:

  # Hero-tree routing
  # Pack Leader (Howl of the Pack Leader) -- the dominant hero talent
  is_pl: talent.howl_of_the_pack_leader
  # Sentinel -- alternative hero talent
  is_sentinel: talent.sentinel

  # Key buff states
  tip_of_spear_up: buff.tip_of_the_spear.up
  sentinels_mark_up: debuff.sentinels_mark.up
  # Pack Leader: Howl beast procs
  howl_wyvern_up: buff.howl_of_the_pack_leader_wyvern.up
  howl_active: "buff.howl_of_the_pack_leader_wyvern.up|buff.howl_of_the_pack_leader_boar.up|buff.howl_of_the_pack_leader_bear.up"
  # Takedown active (after cast)
  takedown_active: buff.takedown.up
  boomstick_buff_up: buff.tip_of_the_spear_boomstick.up

  # Wildfire Bomb charge management
  bomb_capping: cooldown.wildfire_bomb.charges>=2

  want_aoe: state.aoe&active_enemies>=config.aoe_threshold

  # Pet management
  pet_hurt: pet.exists&pet.alive&pet.health.pct<75

lists:
  interrupts:
  - muzzle,if=target.casting.interruptible,use_off_gcd=1
  - muzzle.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - muzzle.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - exhilaration,if=health.pct<=55
  - survival_of_the_fittest,if=health.pct<=40
  - aspect_of_the_turtle,if=health.pct<=20

  dispel:
  - tranquilizing_shot,if=target.purgeable.enrage|target.purgeable.magic
  - tranquilizing_shot.mouseover,if=mouseover.purgeable.enrage|mouseover.purgeable.magic

  pet_care:
  # Revive dead pet (10s anti-spam)
  - revive_pet,range_check=none,if=pet.dead,delay=10000
  # Call pet if dismissed (10s anti-spam)
  - call_pet_1,range_check=none,if=!pet.exists&!pet.dead,delay=10000
  # Mend pet when hurt
  - mend_pet,range_check=none,if=var.pet_hurt

  racials:
  - berserking,use_off_gcd=1,if=var.takedown_active
  - blood_fury,use_off_gcd=1,if=var.takedown_active
  - fireblood,use_off_gcd=1,if=var.takedown_active
  - ancestral_call,use_off_gcd=1,if=var.takedown_active
  - lights_judgment
  - bag_of_tricks

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.takedown_active|!config.use_cooldowns)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.takedown_active|!config.use_cooldowns)
  - potion,if=config.use_potions&var.takedown_active,use_off_gcd=1

  # ===========================================================
  # Single-target rotation
  # Core loop: Kill Command for Tip of the Spear stacks;
  # spend stacks on Takedown/Boomstick; Wildfire Bomb situationally
  # ===========================================================
  st:
  # Pack Leader: Howl beast ability highest priority
  - kill_command,if=var.is_pl&var.howl_active
  - kill_shot,if=target.health.pct<=20
  # KC before Takedown: generate TotS so Takedown window starts strong
  - kill_command,if=cooldown.takedown.ready&!var.tip_of_spear_up
  # Takedown: primary CD (Twin Fangs self-generates 3 TotS)
  - takedown,if=config.use_cooldowns,delay=500,global_delay=300
  - wildfire_bomb,if=var.takedown_active&cooldown.wildfire_bomb.charges>=1
  # Boomstick: use with TotS stack, prioritize during Takedown window
  - boomstick,if=var.tip_of_spear_up|var.boomstick_buff_up
  # Sentinel: Moonlight Chakram after Takedown/Boomstick setup
  - moonlight_chakram,if=talent.moonlight_chakram&var.is_sentinel&(var.takedown_active|!config.use_cooldowns),delay=300
  # Wildfire Bomb: charge cap prevention
  - wildfire_bomb,if=var.bomb_capping
  # Pack Leader: Wyvernmaxxing — 2 bombs per Wyvern proc to extend Fury of the Wyvern
  # (Engine lacks cast-count tracking; approximate by allowing bombs whenever Wyvern is up)
  - wildfire_bomb,if=var.is_pl&var.howl_wyvern_up&cooldown.wildfire_bomb.charges>=1
  # Sentinel: Wildfire Bomb with Sentinel's Mark + TotS
  - wildfire_bomb,if=var.is_sentinel&var.sentinels_mark_up&var.tip_of_spear_up
  # Flamefang Pitch: short-CD rotational ability
  - flamefang_pitch,if=talent.flamefang_pitch&(var.takedown_active|var.tip_of_spear_up)
  # Raptor Swipe: with TotS (morph of raptor_strike when talented)
  - raptor_swipe,if=var.takedown_active
  - raptor_strike,if=var.takedown_active
  - raptor_swipe,if=var.tip_of_spear_up
  - raptor_strike,if=var.tip_of_spear_up
  # Kill Command: TotS generator — must sit above unconditional filler
  - kill_command,if=!var.tip_of_spear_up
  # Raptor Strike / Raptor Swipe: general filler (morph pair)
  - raptor_swipe
  - raptor_strike
  # Kill Command: baseline fallback
  - kill_command
  # Wildfire Bomb: baseline
  - wildfire_bomb

  # ===========================================================
  # AoE / Multi-target rotation
  # Same core with Wildfire Bomb prioritized more for spread damage
  # ===========================================================
  aoe:
  - kill_command,if=var.is_pl&var.howl_active
  - kill_shot,if=target.health.pct<=20
  # KC before Boomstick/Takedown to generate Tip of the Spear
  - kill_command,if=!var.tip_of_spear_up
  # Boomstick: AoE cone is #1 priority in multi-target
  - boomstick,if=var.tip_of_spear_up|var.boomstick_buff_up
  # Wildfire Bomb: charge cap prevention
  - wildfire_bomb,if=var.bomb_capping
  # Takedown: AoE via Flanked talent (Twin Fangs self-generates TotS)
  - takedown,if=config.use_cooldowns,delay=500,global_delay=300
  - wildfire_bomb,if=var.takedown_active&cooldown.wildfire_bomb.charges>=1
  # Sentinel: Moonlight Chakram after Takedown setup
  - moonlight_chakram,if=talent.moonlight_chakram&var.is_sentinel&(var.takedown_active|!config.use_cooldowns),delay=300
  # Pack Leader: Wyvernmaxxing — bombs into Wyvern
  - wildfire_bomb,if=var.is_pl&var.howl_wyvern_up&cooldown.wildfire_bomb.charges>=1
  # Sentinel: Wildfire Bomb with Sentinel's Mark + TotS
  - wildfire_bomb,if=var.is_sentinel&var.sentinels_mark_up&var.tip_of_spear_up
  # Flamefang Pitch: AoE burst
  - flamefang_pitch,if=talent.flamefang_pitch&(var.takedown_active|var.tip_of_spear_up)
  # Raptor Swipe with TotS (morph pair)
  - raptor_swipe,if=var.takedown_active
  - raptor_strike,if=var.takedown_active
  - raptor_swipe,if=var.tip_of_spear_up
  - raptor_strike,if=var.tip_of_spear_up
  # Kill Command: TotS generator — above unconditional filler
  - kill_command,if=!var.tip_of_spear_up
  # Raptor Strike / Raptor Swipe: filler (morph pair)
  - raptor_swipe
  - raptor_strike
  # Kill Command: baseline fallback
  - kill_command
  # Wildfire Bomb: baseline
  - wildfire_bomb

  fallback:
  - kill_shot,if=target.exists&target.enemy&target.alive&target.health.pct<=20,ignore_queue=true
  - kill_command,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - wildfire_bomb,if=target.exists&target.enemy&target.alive&cooldown.wildfire_bomb.charges>=1,ignore_queue=true
  - raptor_swipe,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - raptor_strike,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=pet_care
  - hunters_mark,if=target.exists&target.enemy&!debuff.hunters_mark.up&!player.combat,delay=2000
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Dispel
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=racials,if=config.use_cooldowns
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

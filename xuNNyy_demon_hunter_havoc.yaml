version: "2.0"
author: xuNNyy
patch: 12.1
spec: 577
name: xuNNyy_demon_hunter_havoc
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Purge"
    type: checkbox
    default: true

variables:
  auto_cds: target.boss|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  in_meta: buff.metamorphosis.up
  is_ar: talent.reavers_glaive
  fury_ok: fury>=40
  fury_high: fury>=70
  fury_low: fury<30
  demonsurge_up: buff.demonsurge.up
  eb_window: debuff.essence_break.up
  use_blade_dance: talent.first_blood|active_enemies>=3
  rending_flurry: buff.rending_strike.up&buff.glaive_flurry.up
  in_melee: target.range<=8
  pooling: (cooldown.eye_beam.remains<=gcd*2|cooldown.metamorphosis.remains<=gcd*2)&fury<80

lists:
  interrupts:
  - disrupt,if=target.casting.interruptible,use_off_gcd=1
  - disrupt.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - disrupt.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - blur,if=health.pct<=40,use_off_gcd=1
  - darkness,if=health.pct<=25,use_off_gcd=1

  dispel:
  - consume_magic,if=target.purgeable.magic,use_off_gcd=1
  - consume_magic.mouseover,if=mouseover.purgeable.magic,use_off_gcd=1

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.in_meta|var.eb_window|target.time_to_die<20)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.in_meta|var.eb_window|target.time_to_die<20)
  - potion,if=config.use_potions&(var.in_meta|target.time_to_die<20)

  racials:
  - berserking,use_off_gcd=1,if=var.in_meta|buff.eye_beam.up
  - blood_fury,use_off_gcd=1,if=var.in_meta|buff.eye_beam.up
  - fireblood,use_off_gcd=1,if=var.in_meta
  - ancestral_call,use_off_gcd=1,if=var.in_meta
  - arcane_torrent,use_off_gcd=1,if=var.fury_low
  - lights_judgment,if=var.in_meta|buff.eye_beam.up
  - bag_of_tricks,if=var.in_meta|buff.eye_beam.up

  cooldowns:
  - the_hunt,if=talent.the_hunt&(target.time_to_die>4|target.boss),delay=300
  - metamorphosis,if=!var.in_meta&(cooldown.eye_beam.remains>gcd|!talent.chaotic_transformation)&(target.time_to_die>10|target.boss),delay=300,global_delay=400

  # Called only when var.in_meta. Handles in-meta priorities for both AR and FS.
  # Morph pairs: blade_dance/death_sweep, chaos_strike/annihilation (base then morph, identical conditions).
  meta:
  # P1: Demonsurge consumption / EB window / meta-clip — spend empowerments before Eye Beam refreshes
  - blade_dance,if=var.demonsurge_up|var.eb_window|buff.metamorphosis.remains<gcd
  - death_sweep,if=var.demonsurge_up|var.eb_window|buff.metamorphosis.remains<gcd
  - chaos_strike,if=var.demonsurge_up|var.eb_window|buff.metamorphosis.remains<gcd
  - annihilation,if=var.demonsurge_up|var.eb_window|buff.metamorphosis.remains<gcd
  # P2: FS — empowered Immolation Aura during Demonsurge
  - immolation_aura,if=var.demonsurge_up
  # P3: Eye Beam on cooldown — core Demonsurge generator (FS) and strong AoE
  - eye_beam,if=!var.eb_window&target.time_to_die>3
  # P4: Essence Break setup — Blade Dance nearly ready, sufficient fury
  - essence_break,if=talent.essence_break&fury>=35&cooldown.blade_dance.remains<gcd*2&target.time_to_die>4
  # P5: AR glaive cycle in meta
  - reaver_glaive,if=var.is_ar&buff.rending_strike.down&buff.glaive_flurry.down
  - chaos_strike,if=var.is_ar&var.rending_flurry
  - annihilation,if=var.is_ar&var.rending_flurry
  - blade_dance,if=var.is_ar&buff.glaive_flurry.up&buff.rending_strike.down
  - death_sweep,if=var.is_ar&buff.glaive_flurry.up&buff.rending_strike.down
  # P6: Blade Dance on cooldown
  - blade_dance,if=var.use_blade_dance
  - death_sweep,if=var.use_blade_dance
  # P7: Fury spend
  - chaos_strike,if=var.fury_ok&!var.pooling
  - annihilation,if=var.fury_ok&!var.pooling
  # P8: Fury generation / filler
  - immolation_aura,if=fury<80
  - felblade,if=fury<60
  - throw_glaive
  - demons_bite

  # Aldrachi Reaver — out-of-meta rotation. Focus on glaive cycle and Eye Beam.
  hero_tree_ar:
  # AR glaive activation: use when empowered buffs aren't running
  - reaver_glaive,if=buff.rending_strike.down&buff.glaive_flurry.down
  # AR empowered consumption
  - chaos_strike,if=var.rending_flurry
  - annihilation,if=var.rending_flurry
  - blade_dance,if=buff.glaive_flurry.up&buff.rending_strike.down
  - death_sweep,if=buff.glaive_flurry.up&buff.rending_strike.down
  # Eye Beam on cooldown
  - eye_beam,if=target.time_to_die>3
  # Essence Break setup
  - essence_break,if=talent.essence_break&fury>=35&!var.eb_window&cooldown.blade_dance.remains<gcd*2&target.time_to_die>4
  # EB window and Blade Dance priority
  - blade_dance,if=var.eb_window|var.use_blade_dance
  - death_sweep,if=var.eb_window|var.use_blade_dance
  - chaos_strike,if=var.eb_window|(var.fury_high&!var.pooling)
  - annihilation,if=var.eb_window|(var.fury_high&!var.pooling)
  # Blade Dance on CD
  - blade_dance
  - death_sweep
  # General fury spend
  - chaos_strike,if=var.fury_ok&!var.pooling
  - annihilation,if=var.fury_ok&!var.pooling
  # Fury generation / filler
  - immolation_aura,if=fury<80
  - felblade,if=fury<60
  - throw_glaive
  - demons_bite

  # Fel-Scarred — out-of-meta rotation. Eye Beam on CD is the primary goal.
  hero_tree_fs:
  # Spend existing Demonsurge empowerments before Eye Beam refreshes them
  - blade_dance,if=var.demonsurge_up
  - death_sweep,if=var.demonsurge_up
  - chaos_strike,if=var.demonsurge_up
  - annihilation,if=var.demonsurge_up
  # Eye Beam on cooldown (core Demonsurge generator)
  - eye_beam,if=target.time_to_die>3
  # Essence Break setup
  - essence_break,if=talent.essence_break&fury>=35&!var.eb_window&cooldown.blade_dance.remains<gcd*2&target.time_to_die>4
  # EB window spending
  - blade_dance,if=var.eb_window
  - death_sweep,if=var.eb_window
  - chaos_strike,if=var.eb_window
  - annihilation,if=var.eb_window
  # Blade Dance on cooldown
  - blade_dance,if=var.use_blade_dance
  - death_sweep,if=var.use_blade_dance
  # General fury spend
  - chaos_strike,if=var.fury_ok&!var.pooling
  - annihilation,if=var.fury_ok&!var.pooling
  # Fury generation / filler
  - immolation_aura,if=fury<80
  - felblade,if=fury<60
  - throw_glaive
  - demons_bite

  aoe:
  - eye_beam
  - blade_dance
  - death_sweep
  - immolation_aura
  - essence_break,if=talent.essence_break&fury>=35
  - chaos_strike,if=var.fury_ok&!var.pooling
  - annihilation,if=var.fury_ok&!var.pooling
  - chaos_nova,if=active_enemies>=4
  - felblade,if=fury<60
  - throw_glaive
  - demons_bite

  fallback:
  - chaos_strike,if=target.exists&target.enemy&target.alive&var.fury_ok,ignore_queue=true
  - annihilation,if=target.exists&target.enemy&target.alive&var.in_meta&var.fury_ok,ignore_queue=true
  - throw_glaive
  - demons_bite,if=target.exists&target.enemy&target.alive,ignore_queue=true

  movement:
  - fel_rush,if=!var.in_melee

  precombat:
  - immolation_aura

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Pre-combat
  - call_action_list,name=precombat,if=!player.combat
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=movement
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=racials,if=var.use_cds
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=meta,if=var.in_meta
  - immolation_aura,if=buff.immolation_aura.down&!var.pooling
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=hero_tree_ar,if=var.is_ar
  - call_action_list,name=hero_tree_fs,if=!var.is_ar
  - call_action_list,name=fallback

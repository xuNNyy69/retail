version: "2.0"
author: xuNNyy
patch: 12.1
spec: 102
name: xuNNyy_druid_balance
entry: main

config:
  use_trinkets:
    label: Use Items
    type: checkbox
    default: true
  use_potions:
    label: Use Potions
    type: checkbox
    default: true
  use_defensives:
    label: Use Defensives
    type: checkbox
    default: true
  use_interrupts:
    label: Use Interrupts
    type: checkbox
    default: true
  use_cooldowns:
    label: Use Cooldowns
    type: checkbox
    default: true
  auto_cooldowns:
    label: Smart Cooldowns
    type: checkbox
    default: true
  auto_combat:
    label: Auto Combat
    type: multi_select
    options:
      - label: Off
        value: 0
      - label: Quest
        value: 1
      - label: Combat
        value: 2
      - label: Defensive
        value: 3
    default: [0]
  aoe_threshold:
    label: AoE Threshold
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Dispel/Soothe"
    type: checkbox
    default: true

variables:
  # Hero-tree routing helpers
  # hero_tree.keeper_of_the_grove -> talent.force_of_nature (defining talent)
  # hero_tree.elunes_chosen       -> talent.lunar_calling   (defining talent)
  is_kotg: talent.force_of_nature
  is_ec: talent.lunar_calling
  # CA / Incarn window
  # buff.ca_inc.up -> split to constituent buffs per engine constraint
  ca_active: "buff.celestial_alignment.up|buff.incarnation_chosen_of_elune.up"
  # Eclipse state
  eclipse_down: "!buff.eclipse_lunar.up&!buff.eclipse_solar.up"
  in_eclipse: "buff.eclipse_lunar.up|buff.eclipse_solar.up"
  in_lunar: buff.eclipse_lunar.up
  in_solar: buff.eclipse_solar.up
  eclipse_any: "buff.eclipse_lunar.up|buff.eclipse_solar.up"
  # Eclipse entry direction: lunar for EC and real cleave/AoE, solar otherwise
  enter_lunar: "talent.lunar_calling|spell_targets.starfire>=config.aoe_threshold"
  # AP thresholds
  ap_ready: astral_power>=40
  ap_overcap: astral_power.deficit<10
  # Burst gate: Midnight can report Eclipse inconsistently, so allow AP-ready fallback
  burst_ready: "var.eclipse_any|var.ap_ready"
  # CD pooling: hold AP when CA/Incarn is about to come off CD
  pool_for_cd: "astral_power<30&cooldown.celestial_alignment.remains<gcd*4"
  cd_condition: "!var.pool_for_cd|var.ca_active"
  boat_stacks: "buff.balance_of_all_things_arcane.stack+buff.balance_of_all_things_nature.stack"
  auto_cds: "target.boss|spell_targets.starfire>=config.aoe_threshold"
  # Cooldown state: built-in CDs toggle plus per-rotation checkbox
  use_cds: "state.cds&(config.use_cooldowns|config.auto_cooldowns&var.auto_cds)"
  # TTD can be unknown early on; allow CDs when target is a boss or no estimate exists yet
  major_cd_target_ok: "target.boss|target.time_to_die>15|target.time_to_die=0"
  minor_cd_target_ok: "target.boss|target.time_to_die>4|target.time_to_die=0"
  # AoE routing threshold: prefer spell target counts over nearby enemy snapshots
  want_aoe: state.aoe&spell_targets.starfire>=config.aoe_threshold

lists:
  interrupts:
  - solar_beam,if=target.exists&target.enemy&target.alive&target.casting.interruptible&var.in_lunar
  - skull_bash,if=target.exists&target.enemy&target.alive&target.casting.interruptible
  - skull_bash.mouseover,if=mouseover.exists&mouseover.enemy&mouseover.alive&mouseover.casting.interruptible
  - skull_bash.focus,if=focus.exists&focus.enemy&focus.alive&focus.casting.interruptible

  defensives:
  - barkskin,if=health.pct<=40&buff.barkskin.down
  - renewal,if=health.pct<=30

  dispel:
  - soothe,if=target.exists&target.enemy&target.alive&target.purgeable.enrage
  - soothe.mouseover,if=mouseover.purgeable.enrage
  - remove_corruption,if=player.has_curse|player.has_poison

  racials:
  - berserking,if=var.ca_active,use_off_gcd=1
  - blood_fury,if=var.ca_active,use_off_gcd=1
  - fireblood,if=var.ca_active,use_off_gcd=1
  - ancestral_call,if=var.ca_active,use_off_gcd=1
  - lights_judgment
  - bag_of_tricks

  items:
  - trinket1,if=config.use_trinkets&(trinket_1.sync|var.ca_active|target.time_to_die<20),use_off_gcd=1
  - trinket2,if=config.use_trinkets&(trinket_2.sync|var.ca_active|target.time_to_die<20),use_off_gcd=1
  - potion,if=config.use_potions&(var.ca_active|target.time_to_die<20),use_off_gcd=1

  cooldowns:
  - force_of_nature,if=talent.force_of_nature&var.is_kotg&(var.ca_active|var.in_eclipse|var.eclipse_down)&var.minor_cd_target_ok,delay=300
  - incarnation_chosen_of_elune,if=talent.incarnation_chosen_of_elune&!var.ca_active&var.is_ec&var.eclipse_down&(cooldown.fury_of_elune.ready|!talent.fury_of_elune)&var.major_cd_target_ok,delay=500,global_delay=500
  - incarnation_chosen_of_elune,if=talent.incarnation_chosen_of_elune&!var.ca_active&!var.is_ec&var.in_eclipse&astral_power>=40&var.major_cd_target_ok,delay=500,global_delay=500
  - celestial_alignment,if=talent.celestial_alignment&!talent.incarnation_chosen_of_elune&!var.ca_active&var.in_eclipse&astral_power>=40&var.major_cd_target_ok,delay=500,global_delay=500
  - force_of_nature,if=talent.force_of_nature&!var.is_kotg&var.minor_cd_target_ok,delay=300
  - convoke_the_spirits,if=talent.convoke_the_spirits&!player.channeling&(var.ca_active|var.in_eclipse)&var.minor_cd_target_ok,delay=400,global_delay=400

  # ============================================================
  # Single Target -- Keeper of the Grove (talent.force_of_nature)
  # ============================================================
  single_target_kotg:
  - return,if=!var.is_kotg
  - moonfire,if=dot.moonfire.remains<4
  - sunfire,if=dot.sunfire.remains<4
  - solar_eclipse,if=var.eclipse_down
  - warrior_of_elune,if=talent.warrior_of_elune&buff.warrior_of_elune.down&var.in_lunar,use_off_gcd=1
  - force_of_nature,if=talent.force_of_nature&(var.ca_active|cooldown.celestial_alignment.remains>30|var.in_eclipse)
  - fury_of_elune,if=talent.fury_of_elune&var.in_eclipse&astral_power>=40
  - starsurge,if=buff.ascendant_stars.up&var.ap_ready
  - starsurge,if=var.boat_stacks>0&var.ap_ready
  - starsurge,if=buff.starlord.stack<3&var.in_eclipse&var.ap_ready
  - sunfire,if=dot.sunfire.refreshable&target.time_to_die>4
  - moonfire,if=dot.moonfire.refreshable&target.time_to_die>4
  - convoke_the_spirits,if=talent.convoke_the_spirits&var.in_eclipse&var.ca_active
  - stellar_flare,if=talent.stellar_flare&dot.stellar_flare.refreshable&target.time_to_die>8
  - starsurge,if=var.ap_ready&var.cd_condition
  - new_moon,if=talent.new_moon
  - half_moon,if=talent.half_moon
  - full_moon,if=talent.full_moon
  - starfall,if=buff.starweavers_warp.up|buff.touch_the_cosmos.up
  - starsurge,if=buff.starweavers_weft.up
  - starsurge,if=var.ap_overcap
  - wild_mushroom,if=talent.wild_mushroom&buff.fungal_growth.remains<4
  - wrath,if=buff.ascendant_fires.up
  - starfire,if=var.in_lunar
  - wrath

  # ============================================================
  # Single Target -- Elune's Chosen (talent.lunar_calling)
  # ============================================================
  single_target_ec:
  - return,if=!var.is_ec
  - moonfire,if=dot.moonfire.remains<4
  - sunfire,if=dot.sunfire.remains<4
  - lunar_eclipse,if=var.eclipse_down
  - warrior_of_elune,if=talent.warrior_of_elune&buff.warrior_of_elune.down&var.in_lunar,use_off_gcd=1
  - fury_of_elune,if=talent.fury_of_elune&(var.in_eclipse|var.ca_active)
  - starsurge,if=buff.ascendant_stars.up&var.ap_ready
  - starsurge,if=var.boat_stacks>0&var.ap_ready
  - starsurge,if=buff.starlord.stack<3&var.in_eclipse&var.ap_ready
  - sunfire,if=dot.sunfire.refreshable&target.time_to_die>4
  - moonfire,if=dot.moonfire.refreshable&target.time_to_die>4
  - convoke_the_spirits,if=talent.convoke_the_spirits&var.in_eclipse
  - stellar_flare,if=talent.stellar_flare&dot.stellar_flare.refreshable&target.time_to_die>8
  - starsurge,if=var.ap_ready&var.cd_condition
  - new_moon,if=talent.new_moon
  - half_moon,if=talent.half_moon
  - full_moon,if=talent.full_moon
  - starfall,if=buff.starweavers_warp.up|buff.touch_the_cosmos.up
  - starsurge,if=buff.starweavers_weft.up
  - starsurge,if=var.ap_overcap
  - wild_mushroom,if=talent.wild_mushroom&buff.fungal_growth.remains<4
  - starfire,if=buff.ascendant_fires.up
  - starfire,if=talent.lunar_calling|var.in_lunar
  - wrath

  # ============================================================
  # Single Target -- Default (no hero-tree talent specialisation)
  # ============================================================
  single_target:
  - moonfire,if=dot.moonfire.remains<4
  - sunfire,if=dot.sunfire.remains<4
  - solar_eclipse,if=var.eclipse_down&!var.enter_lunar
  - lunar_eclipse,if=var.eclipse_down&var.enter_lunar
  - warrior_of_elune,if=talent.warrior_of_elune&buff.warrior_of_elune.down&var.in_lunar,use_off_gcd=1
  - fury_of_elune,if=talent.fury_of_elune&var.in_eclipse&astral_power>=40
  - starsurge,if=buff.ascendant_stars.up&var.ap_ready
  - starsurge,if=var.boat_stacks>0&var.ap_ready
  - starsurge,if=buff.starlord.stack<3&var.in_eclipse&var.ap_ready
  - sunfire,if=dot.sunfire.refreshable&target.time_to_die>4
  - moonfire,if=dot.moonfire.refreshable&target.time_to_die>4
  - convoke_the_spirits,if=talent.convoke_the_spirits&var.in_eclipse
  - stellar_flare,if=talent.stellar_flare&dot.stellar_flare.refreshable&target.time_to_die>8
  - starsurge,if=var.ap_ready&var.cd_condition
  - new_moon,if=talent.new_moon
  - half_moon,if=talent.half_moon
  - full_moon,if=talent.full_moon
  - starfall,if=buff.starweavers_warp.up|buff.touch_the_cosmos.up
  - starsurge,if=buff.starweavers_weft.up
  - starsurge,if=var.ap_overcap
  - wild_mushroom,if=talent.wild_mushroom&buff.fungal_growth.remains<4
  - wrath,if=buff.ascendant_fires.up
  - starfire,if=var.in_lunar
  - wrath

  # ============================================================
  # AoE (active_enemies > 1)
  # ============================================================
  aoe:
  - return,if=spell_targets.starfire<2
  - lunar_eclipse,if=var.eclipse_down
  - starsurge,if=buff.dryads_favor.up&var.ap_ready
  - moonfire,target_if=refreshable,if=active_dot.moonfire<active_enemies&active_enemies<=8&target.time_to_die>4
  - sunfire,target_if=refreshable,if=active_dot.sunfire<active_enemies&active_enemies<=8&target.time_to_die>4
  - stellar_flare,target_if=refreshable,if=talent.stellar_flare&active_dot.stellar_flare<active_enemies&target.time_to_die>8&active_enemies<=5
  - force_of_nature,if=talent.force_of_nature&!var.is_kotg
  - fury_of_elune,if=talent.fury_of_elune&var.in_eclipse&astral_power>=40
  - starfall,if=buff.starweavers_warp.up|buff.touch_the_cosmos.up
  - starsurge,if=buff.starweavers_weft.up
  - starfall,if=var.ap_ready
  - convoke_the_spirits,if=talent.convoke_the_spirits&var.in_eclipse
  - new_moon,if=talent.new_moon
  - half_moon,if=talent.half_moon
  - full_moon,if=talent.full_moon
  - wild_mushroom,if=talent.wild_mushroom&buff.fungal_growth.remains<4
  - starfire,if=buff.ascendant_fires.up&active_enemies>2&var.in_lunar
  - starfire,if=talent.lunar_calling|active_enemies>3|var.in_lunar
  - wrath

  fallback:
  - moonfire,if=target.exists&target.enemy&target.alive&dot.moonfire.refreshable&target.time_to_die>4,ignore_queue=true
  - sunfire,if=target.exists&target.enemy&target.alive&dot.sunfire.refreshable&target.time_to_die>4,ignore_queue=true
  - wrath,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - mark_of_the_wild,range_check=none,if=!buff.mark_of_the_wild.up
  - moonkin_form,range_check=none,if=talent.moonkin_form&!buff.moonkin_form.up
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - stop_casting,if=(player.casting|player.channeling)&(buff.warrior_of_elune.up|buff.owlkin_frenzy.up|buff.eclipse_solar.up&buff.eclipse_solar.remains<1|buff.eclipse_lunar.up&buff.eclipse_lunar.remains<1|dot.moonfire.ticking&dot.moonfire.remains<2|dot.sunfire.ticking&dot.sunfire.remains<2)
  - return,if=player.casting|player.channeling
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=racials,if=var.use_cds
  # Hero-tree routing: EC -> KOTG -> default ST -> AoE
  - call_action_list,name=single_target_ec,if=var.is_ec&!var.want_aoe
  - call_action_list,name=single_target_kotg,if=var.is_kotg&!var.is_ec&!var.want_aoe
  - call_action_list,name=single_target,if=!var.want_aoe
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=fallback

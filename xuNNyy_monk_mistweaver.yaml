version: "2.0"
author: xuNNyy
patch: 12.1
spec: 270
name: xuNNyy_monk_mistweaver
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_dispel:
    label: "Use Dispel (Detox)"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  heal_only:
    label: "Heal Only (No DPS)"
    type: checkbox
    default: false
  use_soothing_mist:
    label: "Use Soothing Mist"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  emergency_hp:
    label: "Emergency HP%"
    type: slider
    min: 10
    max: 70
    default: 40
  major_heal_hp:
    label: "Major Heal HP%"
    type: slider
    min: 30
    max: 90
    default: 65
  light_heal_hp:
    label: "Light Heal HP%"
    type: slider
    min: 50
    max: 100
    default: 85
  life_cocoon_hp:
    label: "Life Cocoon HP%"
    type: slider
    min: 10
    max: 70
    default: 35
  revival_hp:
    label: "Revival HP%"
    type: slider
    min: 20
    max: 90
    default: 55
  revival_min_injured:
    label: "Revival Min Injured"
    type: slider
    min: 2
    max: 10
    default: 3
  sheiluns_min_stacks:
    label: "Sheilun's Gift Min Stacks"
    type: slider
    min: 4
    max: 15
    default: 8
  fistweave_group_hp:
    label: "Safe to Fistweave HP%"
    type: slider
    min: 50
    max: 100
    default: 85
  fistweave_max_injured:
    label: "Fistweave Max Injured"
    type: slider
    min: 0
    max: 5
    default: 2
  defensives_hp:
    label: "Fortifying Brew HP%"
    type: slider
    min: 10
    max: 99
    default: 45
  mana_tea_min_stacks:
    label: "Mana Tea Min Stacks"
    type: slider
    min: 10
    max: 20
    default: 12

variables:
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  auto_cds: target.boss|var.need_major_heal|var.multi_emergency|var.need_revival
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds

  # Talent / hero tree detection
  has_cotc: talent.conduit_of_the_celestials
  has_chi_ji: talent.invoke_chi_ji_the_red_crane
  has_yulon: talent.invoke_yulon_the_jade_serpent
  has_teachings: talent.teachings_of_the_monastery
  has_jadefire: talent.jadefire_stomp
  has_rwk: talent.rushing_wind_kick
  has_dance: talent.dance_of_chiji
  has_chi_burst: talent.chi_burst
  has_mana_tea: talent.mana_tea
  has_sheilun: talent.sheiluns_gift
  has_touch_of_death: talent.touch_of_death

  # Buff states
  tft_up: buff.thunder_focus_tea.up
  chiji_up: buff.invoke_chi_ji_the_red_crane.up
  yulon_up: buff.invoke_yulon_the_jade_serpent.up
  invoke_up: var.chiji_up|var.yulon_up
  major_window: var.need_major_heal|var.multi_emergency|var.need_revival
  dance_up: buff.dance_of_chiji.up
  teachings_stack: buff.teachings_of_the_monastery.stack
  sheilun_ready: buff.sheiluns_gift.stack>=config.sheiluns_min_stacks
  sheilun_capped: buff.sheiluns_gift.stack>=14

  # Group health pressure
  need_emergency: group.lowest.health.pct<config.emergency_hp
  multi_emergency: group.count(cycle.health.pct<config.emergency_hp)>=2
  need_major_heal: group.lowest.health.pct<config.major_heal_hp
  need_light_heal: group.lowest.health.pct<config.light_heal_hp
  need_revival: group.count(cycle.health.pct<config.revival_hp)>=config.revival_min_injured
  rmist_needed: group.lowest.health.pct<config.light_heal_hp
  rmist_overcap: cooldown.renewing_mist.charges>=2

  # Safe to fistweave
  safe_to_fistweave: group.lowest.health.pct>=config.fistweave_group_hp&group.count(cycle.health.pct<config.fistweave_group_hp)<=config.fistweave_max_injured

  # Mana
  mana_tea_ready: var.has_mana_tea&buff.mana_tea.stack>=config.mana_tea_min_stacks
  mana_tea_threshold: mana.pct<50

lists:
  interrupts:
  - spear_hand_strike,if=target.exists&target.enemy&target.alive&target.casting.interruptible&!target.casting.important,use_off_gcd=1
  - spear_hand_strike.mouseover,if=mouseover.exists&mouseover.enemy&mouseover.alive&mouseover.casting.interruptible&!mouseover.casting.important,use_off_gcd=1
  - spear_hand_strike.focus,if=focus.exists&focus.enemy&focus.alive&focus.casting.interruptible&!focus.casting.important,use_off_gcd=1

  dispel:
  - detox,cycle_targets=1,if=cycle.dispelable

  defensives:
  - fortifying_brew,if=dangerous_debuff.up|health.pct<config.defensives_hp
  - diffuse_magic,if=dangerous_debuff.magic.up|player.has_magic_debuff,use_off_gcd=1
  - dampen_harm,if=dangerous_debuff.physical.up,use_off_gcd=1
  - touch_of_karma,if=health.pct<config.defensives_hp&target.exists&target.enemy,use_off_gcd=1

  cancel_casts:
  - stop_casting,casting_check=soothing_mist,if=player.channeling&(var.need_emergency|cooldown.life_cocoon.ready&group.lowest.health.pct<config.life_cocoon_hp)
  - stop_casting,casting_check=soothing_mist,if=player.channeling&var.rmist_overcap
  - stop_casting,casting_check=soothing_mist,if=player.channeling&group.lowest.health.pct>=100
  - stop_casting,casting_check=soothing_mist,if=player.channeling&!var.need_major_heal&var.safe_to_fistweave

  sm_healing:
  - vivify,target=lowest,if=var.need_emergency
  - enveloping_mist,target=lowest,if=var.tft_up&var.need_major_heal
  - vivify,target=lowest,if=var.tft_up&var.need_major_heal
  - enveloping_mist,target=lowest,if=var.need_major_heal
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_capped
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_ready&var.need_major_heal
  - vivify,target=lowest,if=var.need_major_heal
  - renewing_mist,target=lowest,if=var.rmist_overcap

  emergency:
  - life_cocoon,target=lowest,if=group.lowest.health.pct<config.life_cocoon_hp
  - revival,if=var.multi_emergency|var.need_revival
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_capped
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_ready
  - renewing_mist,target=lowest,if=var.rmist_overcap
  - vivify,target=lowest
  - renewing_mist,target=lowest,if=cooldown.renewing_mist.charges>=1

  cooldowns:
  - thunder_focus_tea,use_off_gcd=1,if=!var.tft_up&(var.rmist_needed|var.rmist_overcap|var.need_major_heal|var.safe_to_fistweave&cooldown.rising_sun_kick.remains<gcd)
  - invoke_chi_ji_the_red_crane,if=var.has_chi_ji&(var.need_emergency|var.major_window|var.want_aoe),delay=500,global_delay=300
  - invoke_yulon_the_jade_serpent,if=var.has_yulon&!var.has_chi_ji&(var.major_window|var.want_aoe),delay=500,global_delay=300
  - celestial_conduit,if=var.has_cotc&cooldown.celestial_conduit.ready&!var.need_emergency&(var.invoke_up|var.safe_to_fistweave),delay=300,global_delay=250
  - mana_tea,if=var.mana_tea_ready&(!var.need_major_heal|var.mana_tea_threshold)

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.invoke_up|var.need_emergency|var.want_aoe)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.invoke_up|var.need_emergency|var.want_aoe)
  - potion,if=config.use_potions&(var.need_emergency|var.invoke_up)

  racials:
  - berserking,use_off_gcd=1,if=var.invoke_up|var.tft_up
  - blood_fury,use_off_gcd=1,if=var.invoke_up|var.tft_up
  - fireblood,use_off_gcd=1,if=dangerous_debuff.up
  - ancestral_call,use_off_gcd=1,if=var.invoke_up|var.tft_up
  - arcane_torrent,use_off_gcd=1,if=mana.pct<=75
  - lights_judgment
  - bag_of_tricks

  healing:
  - renewing_mist,target=lowest,if=var.tft_up&(var.rmist_needed|var.rmist_overcap)
  - vivify,target=lowest,if=var.tft_up&var.need_major_heal
  - renewing_mist,target=lowest,if=var.rmist_overcap
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_capped
  - life_cocoon,target=lowest,if=group.lowest.health.pct<config.life_cocoon_hp
  - soothing_mist,target=lowest,if=config.use_soothing_mist&var.need_major_heal&!var.need_emergency&!var.safe_to_fistweave&!player.moving&!player.casting&!player.channeling
  - enveloping_mist,target=lowest,if=var.need_major_heal
  - vivify,target=lowest,if=var.need_major_heal
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_ready
  - renewing_mist,target=lowest,if=var.rmist_needed
  - essence_font,if=group.count(cycle.health.pct<config.major_heal_hp)>=2&!var.need_emergency
  - vivify,target=lowest,if=var.need_light_heal
  - renewing_mist,target=lowest,if=cooldown.renewing_mist.charges>=1
  - rising_sun_kick,if=!config.heal_only

  fistweave_st:
  - renewing_mist,target=lowest,if=var.rmist_overcap
  - touch_of_death,if=var.has_touch_of_death&target.health.pct<=15
  - thunder_focus_tea,if=!var.tft_up&(cooldown.rising_sun_kick.remains<gcd|var.rmist_overcap),use_off_gcd=1
  - rising_sun_kick
  - rushing_wind_kick,if=var.has_rwk
  - blackout_kick,if=var.has_teachings&var.teachings_stack>=3
  - jadefire_stomp,if=var.has_jadefire
  - chi_burst,if=var.has_chi_burst
  - blackout_kick,if=var.has_teachings&var.teachings_stack>=1&cooldown.rising_sun_kick.remains>gcd
  - spinning_crane_kick,if=var.has_dance&var.dance_up
  - celestial_conduit,if=var.has_cotc&cooldown.celestial_conduit.ready,delay=300,global_delay=250
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_ready
  - tiger_palm

  fistweave_aoe:
  - renewing_mist,target=lowest,if=var.rmist_needed|var.rmist_overcap
  - touch_of_death,if=var.has_touch_of_death&target.health.pct<=15
  - spinning_crane_kick,if=var.has_dance&var.dance_up
  - thunder_focus_tea,if=!var.tft_up&(var.rmist_overcap|cooldown.rising_sun_kick.remains<gcd),use_off_gcd=1
  - rising_sun_kick
  - rushing_wind_kick,if=var.has_rwk
  - jadefire_stomp,if=var.has_jadefire
  - chi_burst,if=var.has_chi_burst
  - celestial_conduit,if=var.has_cotc&cooldown.celestial_conduit.ready,delay=300,global_delay=250
  - spinning_crane_kick,if=var.want_aoe
  - blackout_kick,if=var.has_teachings&var.teachings_stack>=1&cooldown.rising_sun_kick.remains>gcd
  - sheiluns_gift,if=var.has_sheilun&var.sheilun_ready
  - tiger_palm

  fallback:
  - renewing_mist,target=lowest,if=var.rmist_needed
  - vivify,target=lowest,if=var.need_major_heal
  - chi_burst,if=!config.heal_only&var.has_chi_burst&target.exists&target.enemy&target.alive,ignore_queue=true
  - rising_sun_kick,if=!config.heal_only&target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - blackout_kick,if=!config.heal_only&target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - tiger_palm,if=!config.heal_only&target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true

  out_of_combat:
  - renewing_mist,target=lowest,if=var.rmist_needed
  - vivify,target=lowest,if=var.need_major_heal

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=out_of_combat,if=!player.combat
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  - call_action_list,name=cancel_casts
  - call_action_list,name=sm_healing,if=player.channeling
  # Interrupts
  - call_action_list,name=interrupts,if=config.use_interrupts
  - call_action_list,name=dispel,if=config.use_dispel
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - return,if=player.casting|player.channeling
  - call_action_list,name=emergency,if=var.need_emergency
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=racials,if=var.use_cds
  - call_action_list,name=healing,if=var.need_emergency|!var.safe_to_fistweave
  - return,if=config.heal_only
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - call_action_list,name=fistweave_aoe,if=var.safe_to_fistweave&var.want_aoe
  - call_action_list,name=fistweave_st,if=var.safe_to_fistweave
  - call_action_list,name=healing
  - call_action_list,name=fallback

version: "2.0"
author: xuNNyy
patch: 12.1
spec: 1480
name: xuNNyy_demon_hunter_devourer
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Purge"
    type: checkbox
    default: true

variables:
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  in_meta: buff.void_metamorphosis.up
  is_vs: talent.voidsurge
  fury_low: fury<30
  # Proc tracking
  eradicate_up: buff.eradicate.up
  moment_up: buff.moment_of_craving.up
  hungering_up: buff.hungering_slash.up

lists:
  interrupts:
  - disrupt,if=target.casting.interruptible,use_off_gcd=1
  - disrupt.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - disrupt.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - blur,if=health.pct<=40,use_off_gcd=1
  - darkness,if=health.pct<=25,use_off_gcd=1

  dispel:
  - consume_magic,if=target.purgeable.magic,use_off_gcd=1
  - consume_magic.mouseover,if=mouseover.purgeable.magic,use_off_gcd=1

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&var.in_meta
  - trinket2,use_off_gcd=1,if=config.use_trinkets&var.in_meta
  - potion,if=config.use_potions&var.in_meta

  racials:
  - berserking,use_off_gcd=1,if=var.in_meta
  - blood_fury,use_off_gcd=1,if=var.in_meta
  - fireblood,use_off_gcd=1,if=var.in_meta
  - ancestral_call,use_off_gcd=1,if=var.in_meta
  - arcane_torrent,use_off_gcd=1,if=var.fury_low
  - lights_judgment,if=var.in_meta
  - bag_of_tricks,if=var.in_meta

  # ============================================================
  # Cooldowns — shared between both hero trees
  # ============================================================
  cooldowns:
  # Void Metamorphosis triggers automatically at 50 soul fragments — no manual cast.
  # Soul Immolation: self-DoT for Fury gen + soul fragments — keep rolling
  - soul_immolation,if=talent.soul_immolation&buff.soul_immolation.down

  # ============================================================
  # In Void Metamorphosis — highest burst window
  # Morph pairs: consume/devour, reap/cull (base first, morph after, identical conditions)
  # Void-Scarred morphs: voidblade/pierce_the_veil, hungering_slash/reapers_toll
  # the_hunt/predators_wake (VS meta morph)
  # ============================================================
  meta:
  # P1: Collapsing Star — primary in-meta goal, costs soul fragments (engine usability gates availability)
  - collapsing_star
  # P2: Eradicate — proc from completing Void Ray channel, use before it expires
  - eradicate,if=var.eradicate_up
  # P3: Cull (morph of Reap) on cooldown — high priority nuke
  - reap
  - cull
  # P4: Void-Scarred in-meta — Pierce the Veil (morph of Voidblade)
  - voidblade,if=var.is_vs
  - pierce_the_veil,if=var.is_vs
  # P5: Void Ray — channeled, pauses Fury drain in meta, no Fury cost in meta, 14s hasted CD
  - void_ray
  # P6: Void-Scarred — Reaper's Toll (morph of Hungering Slash, proc-based)
  - hungering_slash,if=var.is_vs&var.hungering_up
  - reapers_toll,if=var.is_vs&var.hungering_up
  # P7: The Hunt / Predator's Wake (VS meta morph)
  - the_hunt,if=talent.the_hunt
  - predators_wake,if=talent.the_hunt
  # P8: Moment of Craving — empowered Consume/Devour (prioritize spending stacked fragments)
  - consume,if=var.moment_up
  - devour,if=var.moment_up
  # P9: Regular Devour (morph of Consume) — reduced CD in meta, generates fragments
  - consume
  - devour
  # P10: Throw Glaive filler
  - throw_glaive

  # ============================================================
  # Void-Scarred — out-of-meta rotation
  # Pierce the Veil replaces Voidblade in meta, Reaper's Toll replaces Hungering Slash in meta
  # Outside meta: Voidblade and Hungering Slash are the base forms
  # ============================================================
  hero_tree_vs:
  # Voidblade first if about to enter Void Meta (setup optimization)
  - voidblade,if=buff.void_metamorphosis.down
  - pierce_the_veil,if=buff.void_metamorphosis.down
  # Reap on cooldown — collect max soul fragments (4 normally, 10 with Moment of Craving)
  - reap
  - cull
  # Eradicate proc — use immediately
  - eradicate,if=var.eradicate_up
  # Hungering Slash — proc from Voidblade hits
  - hungering_slash,if=var.hungering_up
  - reapers_toll,if=var.hungering_up
  # Void Ray — channeled, costs Fury outside meta
  - void_ray,if=fury>=100
  # Consume — soul consumer, generates fragments
  - consume
  - devour
  # The Hunt
  - the_hunt,if=talent.the_hunt
  - predators_wake,if=talent.the_hunt
  # Filler
  - throw_glaive
  - felblade,if=fury<60

  # ============================================================
  # Annihilator — out-of-meta rotation
  # Voidfall building/spending, Catastrophe DoT, Doomsayer buff
  # No Voidblade/Pierce the Veil or Hungering Slash/Reaper's Toll (those are Void-Scarred)
  # ============================================================
  hero_tree_anni:
  # Reap on cooldown — high-priority soul harvest
  - reap
  - cull
  # Eradicate proc
  - eradicate,if=var.eradicate_up
  # Void Ray — channeled, 100 Fury cost outside meta
  - void_ray,if=fury>=100
  # Consume — soul consumer
  - consume
  - devour
  # The Hunt
  - the_hunt,if=talent.the_hunt
  - predators_wake,if=talent.the_hunt
  # Filler
  - throw_glaive
  - felblade,if=fury<60

  # ============================================================
  # AoE — multi-target priority
  # ============================================================
  aoe:
  # Collapsing Star in meta — highest AoE priority
  - collapsing_star,if=var.in_meta
  # Reap/Cull — strong AoE nuke
  - reap
  - cull
  # Eradicate — AoE proc
  - eradicate,if=var.eradicate_up
  # Void Ray — large AoE channel
  - void_ray,if=var.in_meta|fury>=100
  # Voidblade (VS only)
  - voidblade,if=var.is_vs
  - pierce_the_veil,if=var.is_vs
  # Hungering Slash proc (VS only)
  - hungering_slash,if=var.is_vs&var.hungering_up
  - reapers_toll,if=var.is_vs&var.hungering_up
  # Consume/Devour
  - consume
  - devour
  # Chaos Nova / Void Nova for CC + damage
  - chaos_nova,if=active_enemies>=4
  # The Hunt — AoE burst
  - the_hunt,if=talent.the_hunt
  - predators_wake,if=talent.the_hunt
  - throw_glaive
  - felblade,if=fury<60

  fallback:
  - consume,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - devour,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - throw_glaive
  - felblade,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=racials,if=config.use_cooldowns&state.cds
  - call_action_list,name=cooldowns,if=config.use_cooldowns&state.cds
  # Soul Immolation — keep up outside of other lists for continuous fragment gen
  - soul_immolation,if=talent.soul_immolation&buff.soul_immolation.down
  # Meta routing — highest priority when in Void Metamorphosis
  - call_action_list,name=meta,if=var.in_meta
  # AoE routing
  - call_action_list,name=aoe,if=var.want_aoe
  # Hero tree routing
  - call_action_list,name=hero_tree_vs,if=var.is_vs
  - call_action_list,name=hero_tree_anni,if=!var.is_vs
  - call_action_list,name=fallback

version: "2.0"
author: xuNNyy
patch: 12.1
spec: 254
name: xuNNyy_hunter_marksmanship
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  use_dispel:
    label: "Use Tranq Shot"
    type: checkbox
    default: true

variables:

  # Hero-tree routing
  is_dr: talent.black_arrow
  is_sentinel: talent.sentinel

  # Key buff / debuff states
  in_trueshot: buff.trueshot.up
  trick_shots_up: buff.trick_shots.up
  precise_shots_up: buff.precise_shots.up
  withering_fire_up: buff.withering_fire.up
  deathblow_up: buff.deathblow.up
  lock_and_load: buff.lock_and_load.up
  in_execute: target.health.pct<=20

  # Focus management
  focus_dump: focus>=60

  # Sentinel's Mark is a target debuff
  sentinels_mark_up: debuff.sentinels_mark.up

  # AoE routing
  want_aoe: state.aoe&spell_targets.multishot>=config.aoe_threshold

  # Pet management (skip if Lone Wolf)
  has_pet: !talent.lone_wolf
  pet_hurt: pet.exists&pet.alive&pet.health.pct<75

lists:
  interrupts:
  - counter_shot,if=target.casting.interruptible,use_off_gcd=1
  - counter_shot.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - counter_shot.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - exhilaration,if=health.pct<=55
  - survival_of_the_fittest,if=health.pct<=40
  - aspect_of_the_turtle,if=health.pct<=20

  dispel:
  - tranquilizing_shot,if=target.purgeable.enrage|target.purgeable.magic
  - tranquilizing_shot.mouseover,if=mouseover.purgeable.enrage|mouseover.purgeable.magic

  pet_care:
  # Revive dead pet (10s anti-spam)
  - revive_pet,range_check=none,if=pet.dead,delay=10000
  # Call pet if dismissed (10s anti-spam)
  - call_pet_1,range_check=none,if=!pet.exists&!pet.dead,delay=10000
  # Mend pet when hurt
  - mend_pet,range_check=none,if=var.pet_hurt

  racials:
  - berserking,use_off_gcd=1,if=var.in_trueshot
  - blood_fury,use_off_gcd=1,if=var.in_trueshot
  - fireblood,use_off_gcd=1,if=var.in_trueshot
  - ancestral_call,use_off_gcd=1,if=var.in_trueshot
  - lights_judgment
  - bag_of_tricks

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&var.in_trueshot
  - trinket2,use_off_gcd=1,if=config.use_trinkets&var.in_trueshot
  - potion,if=config.use_potions&var.in_trueshot,use_off_gcd=1

  # ===========================================================
  # Dark Ranger -- Single Target
  # ===========================================================
  dr_st:
  - return,if=!var.is_dr
  # Trueshot: use on CD — triggers Withering Fire, Deathblow, Double Tap
  - trueshot,if=config.use_cooldowns
  # Black Arrow: Deathblow / execute / high-health (replaces Kill Shot for DR)
  - black_arrow,if=var.deathblow_up|var.in_execute|target.health.pct>=80
  # Wailing Arrow: consume proc
  - wailing_arrow,if=buff.wailing_arrow.up
  # Lock and Load: instant free Aimed Shot — high priority when proc is up
  - aimed_shot,if=var.lock_and_load
  # Aimed Shot: overcap prevention (Double Tap benefits first Aimed after Trueshot)
  - aimed_shot,if=cooldown.aimed_shot.charges>=2
  # Rapid Fire: Withering Fire window
  - rapid_fire,if=var.withering_fire_up
  # Arcane Shot: consume Precise Shots
  - arcane_shot,if=var.precise_shots_up
  # Volley: maintains Trick Shots passively
  - volley,if=talent.volley
  # Rapid Fire: Bulletstorm buff for next Aimed Shot
  - rapid_fire
  # Aimed Shot: normal priority (Bulletstorm-buffed)
  - aimed_shot
  # Arcane Shot: focus dump to prevent capping
  - arcane_shot,if=var.focus_dump
  # Steady Shot: filler
  - steady_shot

  # ===========================================================
  # Dark Ranger -- AoE / Cleave
  # ===========================================================
  dr_aoe:
  - return,if=!var.is_dr
  # Trueshot: use on CD
  - trueshot,if=config.use_cooldowns
  # Black Arrow: Deathblow / execute (replaces Kill Shot for DR)
  - black_arrow,if=var.deathblow_up|var.in_execute|target.health.pct>=80
  # Multi-Shot: maintain Trick Shots or consume Precise Shots
  - multishot,if=var.precise_shots_up|!var.trick_shots_up
  # Wailing Arrow: AoE burst
  - wailing_arrow,if=buff.wailing_arrow.up
  # Volley: if talented
  - volley,if=talent.volley
  # Lock and Load: instant free Aimed Shot with Trick Shots active
  - aimed_shot,if=var.lock_and_load&var.trick_shots_up
  # Rapid Fire: Withering Fire + Trick Shots
  - rapid_fire,if=var.trick_shots_up&var.withering_fire_up
  # Aimed Shot: with Trick Shots (cleaves)
  - aimed_shot,if=var.trick_shots_up
  # Rapid Fire: with Trick Shots
  - rapid_fire,if=var.trick_shots_up
  # Rapid Fire: still preferable to falling straight to Steady Shot
  - rapid_fire
  # Multi-Shot: refresh Trick Shots
  - multishot
  # Steady Shot: filler
  - steady_shot

  # ===========================================================
  # Sentinel -- Single Target
  # ===========================================================
  sentinel_st:
  - return,if=!var.is_sentinel
  # Trueshot: main cooldown
  - trueshot,if=config.use_cooldowns
  # Kill Shot: Deathblow proc or execute range
  - kill_shot,if=var.deathblow_up|var.in_execute
  # Moonlight Chakram: if talented
  - moonlight_chakram,if=talent.moonlight_chakram
  # Lock and Load: instant free Aimed Shot
  - aimed_shot,if=var.lock_and_load
  # Aimed Shot: overcap prevention
  - aimed_shot,if=cooldown.aimed_shot.charges>=2
  # Arcane Shot: always consume Precise Shots (drives Sentinel's Mark spread)
  - arcane_shot,if=var.precise_shots_up
  # Volley: if talented
  - volley,if=talent.volley
  # Rapid Fire: Bulletstorm buff for next Aimed Shot
  - rapid_fire
  # Aimed Shot: normal priority (Bulletstorm-buffed)
  - aimed_shot
  # Arcane Shot: focus dump to prevent capping
  - arcane_shot,if=var.focus_dump
  # Steady Shot: filler
  - steady_shot

  # ===========================================================
  # Sentinel -- AoE / Cleave
  # ===========================================================
  sentinel_aoe:
  - return,if=!var.is_sentinel
  # Trueshot: main cooldown
  - trueshot,if=config.use_cooldowns
  # Kill Shot: Deathblow proc or execute range
  - kill_shot,if=var.deathblow_up|var.in_execute
  # Multi-Shot: maintain Trick Shots or consume Precise Shots
  - multishot,if=var.precise_shots_up|!var.trick_shots_up
  # Moonlight Chakram: if talented
  - moonlight_chakram,if=talent.moonlight_chakram
  # Volley: if talented
  - volley,if=talent.volley
  # Lock and Load: instant free Aimed Shot with Trick Shots
  - aimed_shot,if=var.lock_and_load&var.trick_shots_up
  # Aimed Shot: with Trick Shots
  - aimed_shot,if=var.trick_shots_up
  # Rapid Fire: with Trick Shots
  - rapid_fire,if=var.trick_shots_up
  # Rapid Fire: still preferable to falling straight to Steady Shot
  - rapid_fire
  # Multi-Shot: refresh
  - multishot
  # Steady Shot: filler
  - steady_shot

  fallback:
  - steady_shot,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=pet_care,if=var.has_pet
  - hunters_mark,if=target.exists&target.enemy&!debuff.hunters_mark.up&!player.combat,delay=2000
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Dispel
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=racials,if=config.use_cooldowns
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  # Dark Ranger routing
  - call_action_list,name=dr_aoe,if=var.is_dr&var.want_aoe
  - call_action_list,name=dr_st,if=var.is_dr
  # Sentinel routing
  - call_action_list,name=sentinel_aoe,if=var.is_sentinel&var.want_aoe
  - call_action_list,name=sentinel_st,if=var.is_sentinel
  # Generic fallback (no specific hero talent detected)
  - trueshot,if=config.use_cooldowns
  - kill_shot,if=var.deathblow_up|var.in_execute
  - aimed_shot,if=var.lock_and_load
  - aimed_shot,if=cooldown.aimed_shot.charges>=2
  - arcane_shot,if=var.precise_shots_up
  - rapid_fire
  - aimed_shot
  - arcane_shot,if=var.focus_dump
  - call_action_list,name=fallback
  - steady_shot

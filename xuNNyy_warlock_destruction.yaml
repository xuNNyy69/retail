version: "2.0"
author: xuNNyy
patch: 12.1
spec: 267
name: xuNNyy_warlock_destruction
entry: main

config:
  use_trinkets:
    label: Use Items
    type: checkbox
    default: true
  use_potions:
    label: Use Potions
    type: checkbox
    default: true
  use_defensives:
    label: Use Defensives
    type: checkbox
    default: true
  use_interrupts:
    label: Use Interrupts
    type: checkbox
    default: true
  use_cooldowns:
    label: Use Cooldowns
    type: checkbox
    default: true
  auto_cooldowns:
    label: Smart Cooldowns
    type: checkbox
    default: true
  auto_combat:
    label: Auto Combat
    type: multi_select
    options:
      - label: Off
        value: 0
      - label: Quest
        value: 1
      - label: Combat
        value: 2
      - label: Defensive
        value: 3
    default: [0]
  aoe_threshold:
    label: AoE Threshold
    type: slider
    min: 2
    max: 8
    default: 3

variables:
  infernal_active: buff.summon_infernal.up
  in_ritual: buff.diabolic_ritual_mother_of_chaos.up|buff.diabolic_ritual_overlord.up|buff.diabolic_ritual_pit_lord.up
  auto_cds: target.boss|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds

lists:
  interrupts:
  - spell_lock,if=target.exists&target.enemy&target.alive&target.casting.interruptible&!target.casting.important
  - spell_lock.mouseover,if=mouseover.exists&mouseover.enemy&mouseover.alive&mouseover.casting.interruptible&!mouseover.casting.important
  - spell_lock.focus,if=focus.exists&focus.enemy&focus.alive&focus.casting.interruptible&!focus.casting.important

  defensives:
  - dark_pact,if=health.pct<=35&buff.dark_pact.down
  - unending_resolve,if=health.pct<=20&buff.unending_resolve.down

  precombat:
  - grimoire_of_sacrifice,if=talent.grimoire_of_sacrifice
  - soul_fire
  - incinerate

  ogcd:
  - potion,use_off_gcd=1,if=config.use_potions&(var.infernal_active|!talent.summon_infernal)
  - berserking,use_off_gcd=1,if=var.use_cds&var.infernal_active
  - blood_fury,use_off_gcd=1,if=var.use_cds&var.infernal_active
  - fireblood,use_off_gcd=1,if=var.use_cds&var.infernal_active
  - ancestral_call,use_off_gcd=1,if=var.use_cds&var.infernal_active

  items:
  - trinket1,if=config.use_trinkets&(var.infernal_active|var.in_ritual)
  - trinket2,if=config.use_trinkets&(var.infernal_active|var.in_ritual)

  default:
  - call_action_list,name=ogcd
  - call_action_list,name=items,if=config.use_trinkets
  - wither,if=talent.wither&(!dot.wither.ticking|dot.wither.refreshable)
  - immolate,if=!talent.wither&(dot.immolate.down|dot.immolate.refreshable)&(!talent.soul_fire|cooldown.soul_fire.remains>gcd)
  - summon_infernal,if=talent.summon_infernal&var.use_cds,delay=500,global_delay=300
  - malevolence,if=talent.malevolence&var.use_cds,delay=300
  - havoc,if=talent.havoc&active_enemies>=2
  - cataclysm,if=talent.cataclysm&active_enemies>=config.aoe_threshold
  - rain_of_fire,if=active_enemies>=config.aoe_threshold&soul_shards>=3
  - ruination,if=talent.ruination&buff.ruination.up
  - chaos_bolt,if=talent.diabolic_ritual&!var.in_ritual&soul_shards>=2
  - chaos_bolt,if=buff.malevolence.up&soul_shards>=2
  - shadowburn,if=talent.shadowburn&(soul_shards>=4|buff.fiendish_cruelty.up)
  - shadowburn,if=talent.shadowburn&target.health.pct<=20&soul_shards>=1
  - chaos_bolt,if=soul_shards>=4
  - incinerate,if=buff.chaotic_inferno_buff.up&soul_shards<=4
  - soul_fire,if=buff.backdraft.up&soul_shards<=4
  - conflagrate,if=cooldown.conflagrate.charges>=2
  - soul_fire,if=cooldown.soul_fire.ready&soul_shards<=4
  - chaos_bolt,if=var.in_ritual&soul_shards>=2
  - infernal_bolt,if=talent.infernal_bolt&soul_shards<=3
  - channel_demonfire,if=talent.channel_demonfire&(active_dot.immolate>=1|active_dot.wither>=1)
  - conflagrate,if=buff.backdraft.stack<2
  - incinerate

  fallback:
  - havoc,if=target.exists&target.enemy&target.alive&active_enemies>=2,ignore_queue=true
  - conflagrate,if=target.exists&target.enemy&target.alive&cooldown.conflagrate.charges>=1,ignore_queue=true
  - chaos_bolt,if=target.exists&target.enemy&target.alive&soul_shards>=4,ignore_queue=true
  - incinerate,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=precombat,if=!player.combat
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - call_action_list,name=default
  - call_action_list,name=fallback

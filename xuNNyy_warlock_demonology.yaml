version: "2.0"
author: xuNNyy
patch: 12.1
spec: 266
name: xuNNyy_warlock_demonology
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3

variables:
  in_tyrant: buff.demonic_tyrant.up
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  auto_cds: target.boss|var.want_aoe
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds

lists:
  interrupts:
  - axe_toss,if=target.casting.interruptible,use_off_gcd=1
  - axe_toss.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - axe_toss.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - unending_resolve,if=health.pct<=45
  - dark_pact,if=health.pct<=55
  - mortal_coil,if=health.pct<=50

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(buff.demonic_tyrant.up|!config.use_cooldowns)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(buff.demonic_tyrant.up|!config.use_cooldowns)

  racials:
  - berserking,use_off_gcd=1,if=buff.demonic_tyrant.up
  - blood_fury,use_off_gcd=1,if=buff.demonic_tyrant.up
  - fireblood,use_off_gcd=1,if=buff.demonic_tyrant.up
  - ancestral_call,use_off_gcd=1,if=buff.demonic_tyrant.up

  precombat:
  - power_siphon,if=talent.power_siphon
  - demonbolt,if=talent.power_siphon&!buff.power_siphon.up
  - shadow_bolt

  default:
  - potion,if=config.use_potions&var.in_tyrant
  - call_action_list,name=racials,if=var.use_cds&var.in_tyrant,use_off_gcd=1
  - call_action_list,name=items,use_off_gcd=1
  - power_siphon,if=talent.power_siphon&buff.demonic_core.stack<=2&buff.wild_imps.stack>=4
  - call_dreadstalkers
  - hand_of_guldan,if=soul_shards>=5
  - hand_of_guldan,if=soul_shards>=3
  - ruination,if=talent.ruination
  - grimoire_imp_lord,if=var.use_cds&talent.grimoire_imp_lord
  - grimoire_fel_ravager,if=var.use_cds&talent.grimoire_fel_ravager
  - summon_demonic_tyrant,if=var.use_cds&buff.dreadstalkers.up&(buff.wild_imps.stack>=3|soul_shards<=2),delay=500,global_delay=300
  - summon_doomguard,if=var.use_cds&talent.summon_doomguard
  - implosion,if=buff.wild_imps.stack>=6&(var.in_tyrant|var.want_aoe)
  - demonbolt,if=debuff.doom.down&soul_shards<4&buff.demonic_core.up&talent.doom
  - demonbolt,if=soul_shards<4&buff.demonic_core.stack>=2
  - infernal_bolt,if=soul_shards<3&talent.infernal_bolt
  - demonbolt,if=buff.demonic_core.up&soul_shards<=2
  - shadow_bolt
  - infernal_bolt,if=talent.infernal_bolt

  fallback:
  - implosion,if=target.exists&target.enemy&target.alive&var.want_aoe&buff.wild_imps.stack>=6,ignore_queue=true
  - call_dreadstalkers,if=target.exists&target.enemy&target.alive&cooldown.call_dreadstalkers.ready,ignore_queue=true
  - power_siphon,if=target.exists&target.enemy&target.alive&talent.power_siphon&buff.wild_imps.stack>=2,ignore_queue=true
  - demonbolt,if=target.exists&target.enemy&target.alive&buff.demonic_core.up,ignore_queue=true,ignore_movement=true
  - hand_of_guldan,if=target.exists&target.enemy&target.alive&soul_shards>=4,ignore_queue=true
  - shadow_bolt,if=target.exists&target.enemy&target.alive,ignore_queue=true,ignore_movement=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=precombat,if=!player.combat
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - call_action_list,name=default
  - call_action_list,name=fallback

version: "2.0"
author: xuNNyy
patch: 12.1
spec: 253
name: xuNNyy_hunter_beast_mastery
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3

variables:
  in_bw: buff.bestial_wrath.up
  want_aoe: active_enemies>=config.aoe_threshold
  is_dr: talent.black_arrow

lists:
  interrupts:
  - counter_shot,if=target.casting.interruptible,use_off_gcd=1

  defensives:
  - exhilaration,if=health.pct<=55
  - survival_of_the_fittest,if=health.pct<=45
  - aspect_of_the_turtle,if=health.pct<=25

  cds:
  - berserking,use_off_gcd=1,if=var.in_bw
  - blood_fury,use_off_gcd=1,if=var.in_bw
  - ancestral_call,use_off_gcd=1,if=var.in_bw
  - fireblood,use_off_gcd=1,if=var.in_bw
  - potion,if=config.use_potions&var.in_bw

  trinkets:
  - use_item,slot=trinket1,use_off_gcd=1,if=config.use_trinkets&var.in_bw
  - use_item,slot=trinket2,use_off_gcd=1,if=config.use_trinkets&var.in_bw

  st:
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - bestial_wrath,if=config.use_cooldowns
  - kill_command,if=buff.howl_of_the_pack_leader_wyvern.up|buff.howl_of_the_pack_leader_boar.up|buff.howl_of_the_pack_leader_bear.up|buff.natures_ally.up
  - kill_command,if=cooldown.bestial_wrath.remains>gcd*3
  - barbed_shot
  - cobra_shot

  cleave:
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - wild_thrash,if=talent.wild_thrash
  - bestial_wrath,if=config.use_cooldowns
  - kill_command
  - cobra_shot,if=cooldown.wild_thrash.remains>gcd&buff.hogstrider.up&active_enemies<4
  - barbed_shot
  - cobra_shot,if=cooldown.wild_thrash.remains>gcd

  drst:
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - bestial_wrath,if=config.use_cooldowns
  - kill_command,if=cooldown.bestial_wrath.remains>gcd*3
  - black_arrow,if=buff.withering_fire.up
  - wailing_arrow,if=buff.wailing_arrow.up
  - cobra_shot,if=talent.killer_cobra&var.in_bw&cooldown.barbed_shot.charges<2
  - barbed_shot
  - black_arrow
  - cobra_shot

  drcleave:
  - wild_thrash,if=talent.wild_thrash&!buff.beast_cleave.up
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - bestial_wrath,if=config.use_cooldowns
  - wailing_arrow,if=buff.wailing_arrow.up
  - wild_thrash,if=talent.wild_thrash
  - kill_command,if=cooldown.bestial_wrath.remains>gcd*3
  - black_arrow,if=buff.withering_fire.up
  - barbed_shot
  - wailing_arrow
  - black_arrow
  - cobra_shot

  fallback:
  - cobra_shot,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=cds,if=config.use_cooldowns
  - call_action_list,name=trinkets,if=config.use_trinkets
  - call_action_list,name=drst,if=var.is_dr&active_enemies<2
  - call_action_list,name=drcleave,if=var.is_dr&active_enemies>1
  - call_action_list,name=cleave,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

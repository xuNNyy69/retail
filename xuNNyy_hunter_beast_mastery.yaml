version: "2.0"
author: xuNNyy
patch: 12.1
spec: 253
name: xuNNyy_hunter_beast_mastery
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 2
  use_dispel:
    label: "Use Tranq Shot"
    type: checkbox
    default: true

variables:
  in_bw: buff.bestial_wrath.up
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  is_dr: talent.black_arrow
  has_pack_leader: talent.howl_of_the_pack_leader
  howl_active: "buff.howl_of_the_pack_leader_wyvern.up|buff.howl_of_the_pack_leader_boar.up|buff.howl_of_the_pack_leader_bear.up|buff.natures_ally.up"
  frenzy_low: buff.frenzy.remains<3
  frenzy_3: buff.frenzy.stack>=3
  beast_cleave_up: buff.beast_cleave.up
  focus_high: focus>=80

  # Pet management
  pet_hurt: pet.exists&pet.alive&pet.health.pct<75

lists:
  interrupts:
  - counter_shot,if=target.casting.interruptible,use_off_gcd=1
  - counter_shot.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - counter_shot.focus,if=focus.casting.interruptible,use_off_gcd=1

  defensives:
  - exhilaration,if=health.pct<=55
  - survival_of_the_fittest,if=health.pct<=45
  - aspect_of_the_turtle,if=health.pct<=25

  dispel:
  - tranquilizing_shot,if=target.purgeable.enrage|target.purgeable.magic
  - tranquilizing_shot.mouseover,if=mouseover.purgeable.enrage|mouseover.purgeable.magic

  pet_care:
  # Revive dead pet (10s anti-spam)
  - revive_pet,range_check=none,if=pet.dead,delay=10000
  # Call pet if dismissed (10s anti-spam)
  - call_pet_1,range_check=none,if=!pet.exists&!pet.dead,delay=10000
  # Mend pet when hurt
  - mend_pet,range_check=none,if=var.pet_hurt

  cooldowns:
  - bloodshed,if=talent.bloodshed&var.in_bw
  - stampede,if=talent.stampede&var.in_bw

  racials:
  - berserking,use_off_gcd=1,if=var.in_bw
  - blood_fury,use_off_gcd=1,if=var.in_bw
  - ancestral_call,use_off_gcd=1,if=var.in_bw
  - fireblood,use_off_gcd=1,if=var.in_bw

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.in_bw|target.boss)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.in_bw|target.boss)
  - potion,if=config.use_potions&var.in_bw

  st:
  - bestial_wrath,if=config.use_cooldowns
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - kill_command,if=var.howl_active
  - kill_command
  - barbed_shot,if=var.frenzy_low|!var.frenzy_3
  - cobra_shot,if=var.focus_high
  - cobra_shot

  cleave:
  - bestial_wrath,if=config.use_cooldowns
  - multishot,if=!var.beast_cleave_up|buff.beast_cleave.remains<2
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - kill_command
  - barbed_shot,if=var.frenzy_low|!var.frenzy_3
  - multishot,if=var.focus_high
  - cobra_shot

  drst:
  - bestial_wrath,if=config.use_cooldowns
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - kill_command,if=cooldown.bestial_wrath.remains>gcd*3
  - black_arrow,if=buff.withering_fire.up
  - wailing_arrow,if=buff.wailing_arrow.up
  - cobra_shot,if=talent.killer_cobra&var.in_bw&cooldown.barbed_shot.charges_fractional<2
  - barbed_shot,if=var.frenzy_low|!var.frenzy_3
  - black_arrow
  - cobra_shot,if=var.focus_high
  - cobra_shot

  drcleave:
  - bestial_wrath,if=config.use_cooldowns
  - multishot,if=!var.beast_cleave_up|buff.beast_cleave.remains<2
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - wailing_arrow,if=buff.wailing_arrow.up
  - kill_command
  - black_arrow,if=buff.withering_fire.up
  - barbed_shot,if=var.frenzy_low|!var.frenzy_3
  - wailing_arrow
  - black_arrow
  - cobra_shot

  plst:
  - bestial_wrath,if=config.use_cooldowns
  - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
  - kill_shot,if=target.health.pct<=20|var.in_bw
  - howl_of_the_pack_leader,if=var.in_bw
  - kill_command,if=var.howl_active
  - kill_command
  - barbed_shot,if=var.frenzy_low|!var.frenzy_3
  - cobra_shot,if=var.focus_high
  - cobra_shot

  fallback:
  - cobra_shot,if=target.exists&target.enemy&target.alive,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=pet_care
  - hunters_mark,if=target.exists&target.enemy&!debuff.hunters_mark.up&!player.combat,delay=2000
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Dispel
  - call_action_list,name=dispel,if=config.use_dispel
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=cooldowns,if=config.use_cooldowns
  - call_action_list,name=racials,if=config.use_cooldowns
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=drst,if=var.is_dr&!var.want_aoe
  - call_action_list,name=drcleave,if=var.is_dr&var.want_aoe
  - call_action_list,name=plst,if=var.has_pack_leader&!var.want_aoe
  - call_action_list,name=cleave,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback

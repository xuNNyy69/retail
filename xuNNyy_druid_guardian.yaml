version: "2.0"
author: xuNNyy
patch: 12.1
spec: 104
name: xuNNyy_druid_guardian
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  auto_cooldowns:
    label: "Smart Cooldowns"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_taunt:
    label: "Auto Taunt"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 3
  defensive_hp:
    label: "Major Defensive HP%"
    type: slider
    min: 20
    max: 80
    default: 50
  self_heal_hp:
    label: "Self Heal HP%"
    type: slider
    min: 20
    max: 90
    default: 65
  ironfur_hp:
    label: "Ironfur below HP%"
    type: slider
    min: 40
    max: 100
    default: 100
  use_dispel:
    label: "Use Dispel/Soothe"
    type: checkbox
    default: true

variables:
  auto_cds: target.boss|health.pct<=85|active_enemies>=config.aoe_threshold
  use_cds: config.use_cooldowns|config.auto_cooldowns&var.auto_cds
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  major_window: target.boss|health.pct<=85|var.want_aoe

  in_bear: buff.bear_form.up

  # Talent flags
  has_kotg: talent.wild_guardian
  has_fos: talent.fount_of_strength
  has_sotf: talent.soul_of_the_forest
  has_red_moon: talent.red_moon
  has_lunation: talent.lunation
  has_killing_blow: talent.killing_blow
  has_bristling: talent.bristling_fur
  has_dotc: talent.ravage|talent.wildpower_surge
  has_gc: talent.lunar_calling

  # Buff states
  ravage_up: buff.ravage.up
  incarnation_up: buff.incarnation_guardian_of_ursoc.up|buff.berserk.up|buff.wild_guardian.up
  gore_up: buff.gore.up
  gg_up: buff.galactic_guardian.up
  ironfur_up: buff.ironfur.up
  ironfur_low: buff.ironfur.remains<=gcd*2

  # Rage states
  rage_ok: rage>=40
  rage_mid: rage>=60
  rage_ec: rage>=70

  mangle_cap: rage<88&!var.has_sotf&!var.has_fos|rage<83&var.has_sotf&!var.has_fos|rage<108&var.has_fos&!var.has_sotf|rage<103&var.has_fos&var.has_sotf

  # Bristling Fur rage threshold
  bristling_rage: rage<60&var.has_killing_blow|rage<40&!var.has_killing_blow

lists:

  taunt:
  - growl,if=config.auto_taunt&player.combat&target.threat<3,use_off_gcd=1

  interrupts:
  - skull_bash,if=target.casting.interruptible,use_off_gcd=1
  - skull_bash.mouseover,if=interrupt.mouseover.check,use_off_gcd=1
  - skull_bash.focus,if=interrupt.focus.check,use_off_gcd=1

  defensives:
  - survival_instincts,if=health.pct<=config.defensive_hp,use_off_gcd=1
  - barkskin,if=health.pct<=(config.defensive_hp+15),use_off_gcd=1

  dispel:
  - soothe,if=target.purgeable.enrage
  - soothe.mouseover,if=mouseover.purgeable.enrage
  - remove_corruption,if=player.has_curse|player.has_poison

  self_healing:
  - frenzied_regeneration,if=health.pct<=config.self_heal_hp&!buff.frenzied_regeneration.up
  - renewal,if=talent.renewal&health.pct<=(config.self_heal_hp-20)
  - healthstone,if=health.pct<=35

  items:
  - trinket1,if=config.use_trinkets&(trinket_1.sync|var.incarnation_up|buff.lunar_beam.up),use_off_gcd=1
  - trinket2,if=config.use_trinkets&(trinket_2.sync|var.incarnation_up|buff.lunar_beam.up),use_off_gcd=1
  - potion,if=config.use_potions&(var.incarnation_up|buff.lunar_beam.up)

  cooldowns:
  # EC (Elune's Chosen): Lunar Beam as close to on CD as possible (Lunation CDR from Thrash + Moonfire)
  - lunar_beam,if=var.has_lunation&(var.want_aoe|!var.incarnation_up)
  # Non-EC (DotC): align with Incarn/Berserk burst window
  - lunar_beam,if=!var.has_lunation&(cooldown.incarnation_guardian_of_ursoc.ready|cooldown.berserk.ready)
  - lunar_beam,if=!var.has_lunation&(cooldown.incarnation_guardian_of_ursoc.remains>60|cooldown.berserk.remains>60)
  - incarnation_guardian_of_ursoc,if=talent.incarnation_guardian_of_ursoc&!var.has_kotg&!var.incarnation_up&var.major_window,delay=500,global_delay=300
  - wild_guardian,if=var.has_kotg&!var.incarnation_up&var.major_window,delay=500,global_delay=300
  - berserk,if=!talent.incarnation_guardian_of_ursoc&!var.incarnation_up&var.major_window,delay=500,global_delay=300
  - convoke_the_spirits,if=talent.convoke_the_spirits&(var.incarnation_up|health.pct<=65),delay=300,global_delay=250
  - rage_of_the_sleeper,if=talent.rage_of_the_sleeper&(var.incarnation_up|health.pct<=65|var.want_aoe),delay=300
  - sundering_roar,if=talent.sundering_roar&debuff.thrash.stack<5
  - bristling_fur,if=var.has_bristling&cooldown.mangle.remains>0&cooldown.thrash.remains>0&var.bristling_rage&!var.ravage_up,use_off_gcd=1
  - barkskin,if=var.incarnation_up&health.pct>(config.defensive_hp+15),use_off_gcd=1

  racials:
  - berserking,use_off_gcd=1,if=var.incarnation_up
  - blood_fury,use_off_gcd=1,if=var.incarnation_up
  - fireblood,use_off_gcd=1,if=var.incarnation_up
  - ancestral_call,use_off_gcd=1,if=var.incarnation_up
  - lights_judgment
  - bag_of_tricks

  # Rage spending: ironfur mitigation first, then overflow damage
  rage_spenders:
  - ironfur,if=config.use_defensives&!var.ironfur_up&!var.ravage_up&var.rage_ok&health.pct<=config.ironfur_hp
  - ironfur,if=config.use_defensives&var.ironfur_low&var.rage_ok&health.pct<=config.ironfur_hp
  # EC spends at 70+ rage; DotC at 60/40; universal 90+ overcap safety; skip raze if Thrash needs refresh
  - raze,if=var.want_aoe&!var.ravage_up&!debuff.thrash.refreshable&(var.has_lunation&var.rage_ec|!var.has_lunation&var.rage_mid|rage>=90)
  - maul,if=var.ravage_up&(var.has_lunation&var.rage_ec|!var.has_lunation&var.rage_ok|rage>=90)
  - maul,if=!var.want_aoe&!var.ravage_up&(var.has_lunation&var.rage_ec|!var.has_lunation&var.rage_mid|rage>=90)

  # Internal: Dream of Cenarius / Ravage proc handling + optional catweave
  bear_dotc:
  # Moonfire DoT: maintain Scintillating Moonlight even during DotC catweave windows
  - moonfire,if=var.in_bear&!var.has_gc&(dot.moonfire.down|dot.moonfire.refreshable)
  # Red Moon: Mangle before Ravage spend (extends debuff, grants bonus rage — guide priority)
  - mangle,if=var.has_red_moon&debuff.red_moon.up
  # Gore proc: immediate Mangle for bonus rage
  - mangle,if=var.gore_up&var.mangle_cap
  # Ravage proc: consume at threshold (Gore proc = free Mangle reset + rage)
  - maul,if=var.ravage_up&rage>=40&!var.has_killing_blow
  - maul,if=var.ravage_up&rage>=60&var.has_killing_blow
  # Catweave (DotC + Wildpower Surge only): empowered Rip window at 6 Feline Potential stacks
  - ferocious_bite,if=talent.wildpower_surge&buff.feline_potential.stack>=6&dot.rip.up&dot.rip.remains>8
  - rip,if=talent.wildpower_surge&buff.feline_potential.stack>=6&(dot.rip.refreshable|dot.rip.down)
  - ferocious_bite,if=talent.wildpower_surge&combo_points>=4&dot.rip.up&dot.rip.remains>8
  - rip,if=talent.wildpower_surge&combo_points>=4&dot.rip.down

  st:
  # Moonfire DoT maintenance (skip if Lunar Calling handles it via Thrash)
  - moonfire,if=var.in_bear&!var.has_gc&(dot.moonfire.down|dot.moonfire.refreshable)
  - call_action_list,name=bear_dotc,if=var.has_dotc
  - thrash,if=debuff.thrash.refreshable|debuff.thrash.down
  # Lunar Calling: extra Thrash value (applies Moonfire via Thrash)
  - thrash,if=var.has_gc
  - mangle,if=var.incarnation_up
  # Gore proc: immediate Mangle for bonus rage
  - mangle,if=var.gore_up&var.mangle_cap
  - mangle,if=var.mangle_cap
  - thrash
  # Galactic Guardian proc
  - moonfire,if=var.gg_up&var.in_bear&!var.has_red_moon
  # EC (Elune's Chosen): Moonfire as filler — Lunation CDR value; pushes Swipe out entirely
  - moonfire,if=var.has_lunation&var.in_bear&!var.has_red_moon
  # DotC / Red Moon / multi-target: Swipe as filler
  - swipe,if=!var.has_lunation|var.has_red_moon|active_enemies>4

  aoe:
  # Moonfire DoT maintenance (skip if Lunar Calling handles it via Thrash)
  - moonfire,if=var.in_bear&!var.has_gc&(dot.moonfire.down|dot.moonfire.refreshable)
  - thrash,if=debuff.thrash.refreshable|debuff.thrash.down
  # Lunar Calling: extra Thrash value
  - thrash,if=var.has_gc
  # Red Moon: Mangle first — extends debuff, grants bonus rage
  - mangle,if=var.has_red_moon&debuff.red_moon.up
  - mangle,if=var.incarnation_up
  # Gore proc: immediate Mangle for bonus rage
  - mangle,if=var.gore_up&var.mangle_cap
  # Galactic Guardian proc
  - moonfire,if=var.gg_up&var.in_bear&!var.has_red_moon
  - mangle,if=var.mangle_cap
  - thrash
  # EC: Moonfire filler; DotC / Red Moon: Swipe filler
  - moonfire,if=var.has_lunation&var.in_bear&!var.has_red_moon
  - swipe,if=!var.has_lunation|var.has_red_moon|active_enemies>4

  fallback:
  - moonfire,if=target.exists&target.enemy&target.alive&target.range>8,ignore_queue=true
  - thrash,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - mangle,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true
  - swipe,if=target.exists&target.enemy&target.alive&target.range<=8,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - mark_of_the_wild,range_check=none,if=!buff.mark_of_the_wild.up
  - bear_form,range_check=none,if=!var.in_bear
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts + taunt (off-GCD, before cast guard)
  - call_action_list,name=interrupts,if=config.use_interrupts
  - call_action_list,name=taunt
  # Defensives + self healing
  - call_action_list,name=defensives,if=config.use_defensives
  - call_action_list,name=dispel,if=config.use_dispel
  - call_action_list,name=self_healing
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - auto_attack
  - call_action_list,name=items,if=config.use_trinkets|config.use_potions
  - call_action_list,name=cooldowns,if=var.use_cds
  - call_action_list,name=racials,if=var.use_cds
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=rage_spenders
  - call_action_list,name=fallback

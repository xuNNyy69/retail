version: "2.0"
author: xuNNyy
patch: 12.1
spec: 252
name: xuNNyy_death_knight_unholy
entry: main

config:
  use_trinkets:
    label: "Use Items"
    type: checkbox
    default: true
  use_cooldowns:
    label: "Use Cooldowns"
    type: checkbox
    default: true
  use_potions:
    label: "Use Potions"
    type: checkbox
    default: true
  use_defensives:
    label: "Use Defensives"
    type: checkbox
    default: true
  use_interrupts:
    label: "Use Interrupts"
    type: checkbox
    default: true
  auto_combat:
    label: "Auto Combat"
    type: multi_select
    options:
      - label: "Off"
        value: 0
      - label: "Quest"
        value: 1
      - label: "Combat"
        value: 2
      - label: "Defensive"
        value: 3
    default: [0]
  aoe_threshold:
    label: "AoE Threshold"
    type: slider
    min: 2
    max: 8
    default: 4
  funnel_mode:
    label: "Funnel (Boss Focus)"
    type: checkbox
    default: true
  death_strike_hp:
    label: "Death Strike HP%"
    type: slider
    min: 30
    max: 80
    default: 60

variables:
  want_aoe: state.aoe&active_enemies>=config.aoe_threshold
  want_funnel: config.funnel_mode&active_enemies>=config.aoe_threshold&target.boss
  opener_done: combat.time>8|!player.combat
  has_sanlayn: talent.vampiric_strike
  has_rider: talent.apocalypse_now
  pet_missing: pet.exists=0|pet.dead
  wounds_up: debuff.festering_wound.up
  wounds_low: debuff.festering_wound.stack<4
  vp_refresh: debuff.virulent_plague.down|debuff.virulent_plague.remains<4
  # Wowhead: spend DC when Sudden Doom proc or RP >= 80
  rp_spend: buff.sudden_doom.up|runic_power>=80
  dt_up: buff.dark_transformation.up
  gargoyle_window: buff.summon_gargoyle.up
  rp_gargoyle: runic_power>=60&var.gargoyle_window
  # APL uses active_enemies>=3 for epidemic threshold (not config-based)
  epidemic_mode: talent.epidemic&active_enemies>=3
  # Wowhead: Soul Reaper on CD when talented (no execute gating in Midnight)
  sr_ready: talent.soul_reaper
  gift_up: var.has_sanlayn&buff.gift_of_the_sanlayn.up
  rider_active: var.has_rider&(buff.mograines_might.up|buff.nazgrims_march.up|buff.trollbanes_icy_fury.up|buff.whitemanes_famine.up)

lists:
  interrupts:
  - mind_freeze,if=target.casting.interruptible,use_off_gcd=1
  - mind_freeze.mouseover,if=mouseover.casting.interruptible,use_off_gcd=1
  - mind_freeze.focus,if=focus.casting.interruptible,use_off_gcd=1
  - asphyxiate,if=target.casting.interruptible&cooldown.mind_freeze.remains>0,use_off_gcd=1

  defensives:
  - anti_magic_shell,if=dangerous_debuff.magic.up,use_off_gcd=1
  - icebound_fortitude,if=(dangerous_debuff.up|health.pct<=35)
  - lichborne,if=health.pct<=30
  - death_strike,if=health.pct<=config.death_strike_hp&runic_power>=35

  items:
  - trinket1,use_off_gcd=1,if=config.use_trinkets&(var.dt_up|var.gargoyle_window|target.boss)
  - trinket2,use_off_gcd=1,if=config.use_trinkets&(var.dt_up|var.gargoyle_window|target.boss)
  - potion,if=config.use_potions&var.dt_up

  movement:
  - death_grip
  - deaths_caress
  - outbreak,if=var.vp_refresh

  precombat:
  - raise_dead,if=var.pet_missing

  opener:
  - raise_dead,if=var.pet_missing
  - outbreak,if=var.vp_refresh
  - festering_strike,if=var.wounds_low
  - dark_transformation
  - call_action_list,name=cooldowns,if=config.use_cooldowns

  cooldowns:
  - raise_dead,if=var.pet_missing,use_off_gcd=1
  - outbreak,if=var.vp_refresh
  # Army and DT are top priority CDs (Wowhead #2, #3)
  - army_of_the_dead,use_off_gcd=1,delay=500,global_delay=300
  - dark_transformation,use_off_gcd=1,delay=300
  # Putrefy at 2 charges (Wowhead #4)
  - putrefy,if=talent.putrefy&cooldown.putrefy.charges>=2,delay=300
  # Soul Reaper on CD (Wowhead #5)
  - soul_reaper,if=var.sr_ready
  - summon_gargoyle,if=talent.summon_gargoyle&runic_power>=60,delay=500,global_delay=300
  - raise_abomination,if=talent.raise_abomination,delay=300
  - unholy_blight,if=talent.unholy_blight,delay=300
  - apocalypse,if=debuff.festering_wound.stack>=4,delay=300,global_delay=400
  - vile_contagion,if=debuff.festering_wound.stack>=4&active_enemies>=2
  - defile,if=talent.defile
  - death_and_decay,if=!talent.defile&active_enemies>=2
  - unholy_assault,if=talent.unholy_assault&var.wounds_low
  - empower_rune_weapon,if=rune<2&runic_power<40
  - abomination_limb,if=talent.abomination_limb,delay=300

  burst:
  - return,if=!var.dt_up&!var.gargoyle_window
  # Gift of the Sanlayn — highest-priority strike during Sanlayn hero tree
  - vampiric_strike,if=var.gift_up
  - scourge_strike,if=var.gift_up
  # Soul Reaper during burst window
  - soul_reaper,if=var.sr_ready
  # Putrefy 2 charges during burst (Wowhead FK #1)
  - putrefy,if=talent.putrefy&cooldown.putrefy.charges>=2
  # Scythe buff refresh (Wowhead FK #3)
  - festering_scythe,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - festering_strike,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - putrefy,if=talent.putrefy
  # Wound management during burst
  - festering_strike,if=var.wounds_low
  - scourge_strike,if=var.wounds_up
  - vampiric_strike,if=var.wounds_up
  # Gargoyle filler — dump RP while gargoyle is active
  - death_coil,if=var.gargoyle_window&var.rp_gargoyle&!var.epidemic_mode
  - epidemic,if=var.gargoyle_window&var.rp_gargoyle&var.epidemic_mode
  # Rider of the Apocalypse buff dump
  - death_coil,if=var.rider_active&runic_power>=40&!var.epidemic_mode
  - epidemic,if=var.rider_active&runic_power>=40&var.epidemic_mode
  # RP spend (Wowhead: Sudden Doom or 80+ RP)
  - death_coil,if=var.rp_spend&!var.epidemic_mode
  - epidemic,if=var.rp_spend&var.epidemic_mode
  - scourge_strike
  - vampiric_strike

  st:
  - outbreak,if=var.vp_refresh
  # Putrefy when DT is far away (Wowhead #6)
  - putrefy,if=talent.putrefy&cooldown.dark_transformation.remains>15
  # Scythe buff refresh (Wowhead #7)
  - festering_scythe,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - festering_strike,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  # Death Coil on Sudden Doom or 80+ RP (Wowhead #8)
  # Epidemic at 3+ targets instead of DC (Wowhead #8)
  - epidemic,if=var.epidemic_mode&var.rp_spend
  - death_coil,if=!var.epidemic_mode&var.rp_spend
  - festering_strike,if=var.wounds_low
  - scourge_strike,if=var.wounds_up
  - vampiric_strike,if=var.wounds_up
  - death_coil,if=var.rider_active&runic_power>=40&!var.epidemic_mode
  - epidemic,if=var.rider_active&runic_power>=40&var.epidemic_mode
  - scourge_strike
  - vampiric_strike
  - epidemic,if=var.epidemic_mode&runic_power>=40,ignore_queue=true
  - death_coil,if=runic_power>=40,ignore_queue=true

  aoe:
  - outbreak,if=var.vp_refresh
  # Soul Reaper on CD during AoE
  - soul_reaper,if=var.sr_ready
  # APL: keep D&D ticking when desecrate talent is active
  - death_and_decay,if=talent.desecrate&cooldown.death_and_decay.ready
  # Scythe buff refresh on expiry during AoE
  - festering_scythe,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - festering_strike,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - putrefy,if=talent.putrefy&cooldown.dark_transformation.remains>15
  # Epidemic: primary AoE RP spender (9.8% total damage per Archon)
  - epidemic,if=var.epidemic_mode&debuff.virulent_plague.up&var.rp_spend
  - scourge_strike,if=var.wounds_up
  - vampiric_strike,if=var.wounds_up
  - festering_strike,if=var.wounds_low
  # Rider of the Apocalypse buff dump during AoE
  - epidemic,if=var.rider_active&var.epidemic_mode&runic_power>=40
  - death_coil,if=var.rider_active&!var.epidemic_mode&runic_power>=40
  - death_coil,if=!var.epidemic_mode&var.rp_spend
  - epidemic,if=var.epidemic_mode&debuff.virulent_plague.up&runic_power>=40
  - death_coil,if=!var.epidemic_mode&runic_power>=40,ignore_queue=true

  funnel:
  - outbreak,if=var.vp_refresh
  - death_and_decay,if=talent.desecrate&cooldown.death_and_decay.ready
  # Scythe buff refresh for boss focus
  - festering_scythe,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - festering_strike,if=talent.festering_scythe&(!buff.festering_scythe.up|buff.festering_scythe.remains<=3)
  - putrefy,if=talent.putrefy&cooldown.dark_transformation.remains>15
  - scourge_strike,if=var.wounds_up
  - vampiric_strike,if=var.wounds_up
  - festering_strike,if=var.wounds_low
  # RP spend — epidemic for cleave value, DC for boss focus
  - epidemic,if=var.epidemic_mode&debuff.virulent_plague.up&var.rp_spend
  - death_coil,if=var.rp_spend
  # Rider buff dump during funnel
  - death_coil,if=var.rider_active&runic_power>=40
  - scourge_strike
  - vampiric_strike
  - death_coil,if=runic_power>=40,ignore_queue=true


  racials:
  # APL: burst-window racials aligned to dark_transformation window
  - berserking,if=var.dt_up,use_off_gcd=1
  - blood_fury,if=var.dt_up,use_off_gcd=1
  - fireblood,if=var.dt_up,use_off_gcd=1
  - ancestral_call,if=var.dt_up,use_off_gcd=1
  # APL: resource-dump racials when rune-starved and low RP
  - lights_judgment,if=rune<2&runic_power<20
  - bag_of_tricks,if=rune<2&runic_power<20
  - arcane_torrent,if=rune<2&runic_power<20,use_off_gcd=1
  - arcane_pulse,if=rune<2&runic_power<20

  fallback:
  - outbreak,if=target.exists&target.enemy&target.alive&var.vp_refresh,ignore_queue=true
  - deaths_caress,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - epidemic,if=target.exists&target.enemy&target.alive&var.epidemic_mode&runic_power>=40,ignore_queue=true
  - scourge_strike,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - vampiric_strike,if=target.exists&target.enemy&target.alive,ignore_queue=true
  - death_coil,if=target.exists&target.enemy&target.alive&runic_power>=40,ignore_queue=true

  main:
  - call_action_list,name=spell_queue
  - call_action_list,name=sanity_checks
  - call_action_list,name=auto_target
  - call_action_list,name=precombat,if=!player.combat
  # Combat check
  - return,if=!player.combat&!((config.auto_combat.has(1)&target.quest_mob&target.enemy)|(config.auto_combat.has(2)&target.combat&target.enemy)|(config.auto_combat.has(3)&player.auto_attacking&target.enemy))
  - return,if=!player.combat&config.auto_combat.has(0)
  # Interrupts (before cast guard so off-GCD interrupts fire while casting)
  - call_action_list,name=interrupts,if=config.use_interrupts
  # Defensives
  - call_action_list,name=defensives,if=config.use_defensives
  # Target check
  - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
  - return,if=!target.valid&config.auto_combat.has(0)
  - return,if=player.casting|player.channeling
  - call_action_list,name=items,if=config.use_trinkets
  - call_action_list,name=opener,if=!var.opener_done
  - call_action_list,name=movement
  - call_action_list,name=cooldowns,if=config.use_cooldowns
  - call_action_list,name=racials,if=config.use_cooldowns
  - call_action_list,name=burst,if=(var.dt_up|var.gargoyle_window)
  - call_action_list,name=funnel,if=var.want_funnel
  - call_action_list,name=aoe,if=var.want_aoe
  - call_action_list,name=st
  - call_action_list,name=fallback
